function addCustomRadioChannel(query) {
  const trimmed = query.trim();
  if (!trimmed) return;
  const entry = {
    id: 'custom-' + Date.now(),
    name: trimmed + ' (Radio)',
    category: 'Music',
    cadence: 'Anytime',
    lengthMin: null,
    flexible: true,
    sourceType: 'internet-radio',
    feedUrl: 'radio-browser:tag:' + trimmed.toLowerCase(),
    feedStatus: 'verified',
    desc: 'Custom Radio-Browser search: "' + trimmed + '", length you set.',
  };
  SOURCES.push(entry);
  customRadioSources.push(entry);
  save('airtime_custom_sources_v1', customRadioSources);
  renderFilters();
  renderLibrary();
  addSourceToTimeline(entry.id);
  // Scroll the new block into view and show a confirmation near the button so it's
  // obvious something happened (the block appears in the timeline above the library).
  const statusEl = document.getElementById('custom-radio-status');
  if (statusEl) {
    statusEl.className = '';
    statusEl.textContent = '✓ "' + trimmed + '" added to your timeline ↑';
    clearTimeout(statusEl._timer);
    statusEl._timer = setTimeout(() => {
      statusEl.classList.add('fade');
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 350);
    }, 3500);
  }
  const blocks = document.querySelectorAll('#timeline .block');
  const last = blocks[blocks.length - 1];
  if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

// ---------- State ----------
let activeCategory = null;
let activeLengthBucket = null;
let activeFormat = null;
let searchText = '';
let timelineBlocks = load('airtime_timeline_v1', []);
let rundowns = load('airtime_rundowns_v1', []);

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

// ---------- Library rendering ----------
const LENGTH_BUCKETS = [
  { id: 'under5', label: 'Under 5 min', test: len => len < 5 },
  { id: '5to20',  label: '5-20 min',    test: len => len >= 5 && len <= 20 },
  { id: 'over20', label: '20+ min',     test: len => len > 20 },
];

// A "Podcast" bucket wouldn't be useful as a genre category (it'd match ~80 of 113 sources), but
// it's a genuinely useful independent filter dimension alongside category/length — distinguishing
// delivery format (episodic RSS feed vs. always-on radio stream) rather than subject.
const FORMAT_GROUPS = [
  { id: 'podcast', label: 'Podcast', test: s => s.sourceType === 'podcast-rss' || s.sourceType === 'archive' },
  { id: 'radio',   label: 'Internet Radio', test: s => s.sourceType === 'internet-radio' },
];

function matchesFormat(s) {
  if (!activeFormat) return true;
  const group = FORMAT_GROUPS.find(g => g.id === activeFormat);
  return group ? group.test(s) : true;
}

function matchesLengthBucket(s) {
  if (!activeLengthBucket) return true;
  if (s.flexible) return true; // length is user-set at drop time, so it fits every bucket
  const bucket = LENGTH_BUCKETS.find(b => b.id === activeLengthBucket);
  return bucket ? bucket.test(s.lengthMin) : true;
}

function renderFilters() {
  const cats = [...new Set(SOURCES.map(s => s.category))].sort((a, b) => {
    if (a === 'NPR') return -1;
    if (b === 'NPR') return 1;
    return a.localeCompare(b);
  });
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'cat-chip' + (activeCategory === null ? ' active' : '');
  allChip.textContent = 'All';
  allChip.onclick = () => { activeCategory = null; renderFilters(); renderLibrary(); };
  wrap.appendChild(allChip);
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (activeCategory === cat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeCategory = (activeCategory === cat ? null : cat); renderFilters(); renderLibrary(); };
    wrap.appendChild(chip);
  });

  const lengthWrap = document.getElementById('length-filters');
  lengthWrap.innerHTML = '';
  const allLengthChip = document.createElement('div');
  allLengthChip.className = 'cat-chip' + (activeLengthBucket === null ? ' active' : '');
  allLengthChip.textContent = 'Any length';
  allLengthChip.onclick = () => { activeLengthBucket = null; renderFilters(); renderLibrary(); };
  lengthWrap.appendChild(allLengthChip);
  LENGTH_BUCKETS.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (activeLengthBucket === b.id ? ' active' : '');
    chip.textContent = b.label;
    chip.onclick = () => { activeLengthBucket = (activeLengthBucket === b.id ? null : b.id); renderFilters(); renderLibrary(); };
    lengthWrap.appendChild(chip);
  });

  const formatWrap = document.getElementById('format-filters');
  formatWrap.innerHTML = '';
  const allFormatChip = document.createElement('div');
  allFormatChip.className = 'cat-chip' + (activeFormat === null ? ' active' : '');
  allFormatChip.textContent = 'Any format';
  allFormatChip.onclick = () => { activeFormat = null; renderFilters(); renderLibrary(); };
  formatWrap.appendChild(allFormatChip);
  FORMAT_GROUPS.forEach(g => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (activeFormat === g.id ? ' active' : '');
    chip.textContent = g.label;
    chip.onclick = () => { activeFormat = (activeFormat === g.id ? null : g.id); renderFilters(); renderLibrary(); };
    formatWrap.appendChild(chip);
  });
}

function renderLibrary() {
  const list = document.getElementById('source-list');
  list.innerHTML = '';

  // Recently used chips — shown at top when the user has added sources before. Only chips that
  // pass the current filters are shown so the row stays relevant (e.g. no Music chips while
  // browsing News). Hidden entirely when filters would leave it empty.
  const recentSrcs = recentSourceIds
    .map(id => SOURCES.find(s => s.id === id))
    .filter(Boolean)
    .filter(s => !activeCategory || s.category === activeCategory)
    .filter(matchesLengthBucket)
    .filter(matchesFormat);
  if (recentSrcs.length > 0) {
    const recentEl = document.createElement('div');
    recentEl.id = 'recently-used';
    recentEl.innerHTML = '<div class="recently-used-label">Recently used</div><div class="recently-used-row"></div>';
    const row = recentEl.querySelector('.recently-used-row');
    recentSrcs.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'recent-chip';
      chip.style.setProperty('--chip-color', CATEGORY_COLORS[s.category] || 'var(--border)');
      chip.title = s.desc;
      chip.innerHTML = `${s.name} <span class="recent-chip-plus">+</span>`;
      chip.addEventListener('click', () => addSourceToTimeline(s.id));
      row.appendChild(chip);
    });
    list.appendChild(recentEl);
  }

  const q = searchText.trim().toLowerCase();
  const matches = SOURCES
    .filter(s => !activeCategory || s.category === activeCategory)
    .filter(matchesLengthBucket)
    .filter(matchesFormat)
    .filter(s => !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.network.toLowerCase().includes(q));

  if (matches.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No sources match your filters. Try clearing the category, length, or search filters.';
    list.appendChild(empty);
    return;
  }

  matches.forEach(s => {
      const card = document.createElement('div');
      card.className = 'source-card';
      card.draggable = true;
      card.style.setProperty('--card-color', CATEGORY_COLORS[s.category] || 'var(--accent)');
      const badgeText = s.feedStatus === 'verified' ? 'feed ok' : s.feedStatus === 'unverified' ? 'unverified' : 'no feed';
      card.innerHTML = `
        <div class="source-card-top">
          <div class="source-name">${s.name}</div>
          <button class="source-add-btn" title="Add to timeline" aria-label="Add ${s.name} to timeline" data-id="${s.id}">+</button>
        </div>
        <div class="source-meta">
          <span class="tag tag-network">${s.network}</span>
          <span class="tag">${s.category}</span>
          <span class="tag">${s.cadence}</span>
          <span class="tag">${s.flexible ? 'flexible length' : s.lengthMin + ' min'}</span>
          <span class="feed-badge ${s.feedStatus}">${badgeText}</span>
        </div>
        <div class="source-desc">${s.desc}</div>
      `;
      card.addEventListener('dragstart', e => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', s.id);
        e.dataTransfer.effectAllowed = 'copy';
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.querySelector('.source-add-btn').addEventListener('click', e => {
        e.stopPropagation();
        addSourceToTimeline(s.id);
      });
      card.addEventListener('dblclick', () => addSourceToTimeline(s.id));
      list.appendChild(card);
  });
}

// ---------- Timeline rendering ----------
// Visual time-blocking: width scales with duration so the timeline reads like a real broadcast
// log at a glance. Clamped so a 2-min StarDate stays tappable and a 2-hour PHC show doesn't
// swallow the whole row.
function blockWidthPx(lengthMin) {
  // 136px is the narrowest a card can go while still comfortably fitting the editable-duration
  // row (input + unit label + remove button) on one line without wrapping -- verified live that
  // 120px was too tight and silently wrapped that row onto a second line, throwing off vertical
  // alignment against neighboring cards.
  return Math.max(136, Math.min(320, 40 + lengthMin * 2.5));
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = '';
  el.classList.toggle('empty', timelineBlocks.length === 0);

  timelineBlocks.forEach((b, idx) => {
    const src = SOURCES.find(s => s.id === b.sourceId);
    const isFlexible = src ? !!src.flexible : false;
    const block = document.createElement('div');
    block.className = 'block' + (isFlexible ? ' flexible' : '') + (typeof playerState !== 'undefined' && playerState.currentIndex === idx ? ' playing' : '');
    block.draggable = true;
    block.dataset.uid = b.uid;
    block.style.setProperty('--card-color', CATEGORY_COLORS[b.category] || 'var(--accent)');
    block.style.width = blockWidthPx(b.lengthMin) + 'px';
    block.innerHTML = `
      <div class="block-top">
        <div class="block-index">${idx + 1}</div>
        <div class="block-body">
          <div class="block-name">${b.name}</div>
          <div class="block-meta">
            ${b.category} · ${src ? src.cadence : '<span class="feed-badge none">source removed</span>'}
            ${isFlexible ? `<span class="flex-badge" title="You set how long this one plays -- it's a live stream or open-ended queue, not a fixed episode.">Flexible</span>` : ''}
          </div>
        </div>
      </div>
      <div class="block-bottom">
        <div class="block-duration">
          ${isFlexible
            ? `<input type="number" min="1" value="${b.lengthMin}" data-uid="${b.uid}" class="dur-input" aria-label="Length in minutes for ${b.name}"> min`
            : `<span class="dur-fixed" title="This plays to its own natural end automatically -- it can't be lengthened or shortened. Shown here only as an estimate for the running total.">~${b.lengthMin} min</span>`
          }
        </div>
        <button class="block-move" data-uid="${b.uid}" data-dir="-1" title="Move up" aria-label="Move ${b.name} up" ${idx === 0 ? 'disabled' : ''}>↑</button>
        <button class="block-move" data-uid="${b.uid}" data-dir="1" title="Move down" aria-label="Move ${b.name} down" ${idx === timelineBlocks.length - 1 ? 'disabled' : ''}>↓</button>
        <button class="block-remove" data-uid="${b.uid}" aria-label="Remove ${b.name} from timeline">✕</button>
      </div>
      <div class="block-progress-bar"><div class="block-progress-fill"></div></div>
    `;
    block.addEventListener('dragstart', e => {
      block.classList.add('dragging');
      e.dataTransfer.setData('text/x-reorder', b.uid);
      e.dataTransfer.effectAllowed = 'move';
    });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));
    el.appendChild(block);
  });

  const hint = document.createElement('div');
  hint.className = 'timeline-drop-hint';
  hint.innerHTML = 'Drag a source<br>here to add it';
  el.appendChild(hint);

  el.querySelectorAll('.block-move').forEach(btn => {
    btn.addEventListener('click', () => moveBlock(btn.dataset.uid, parseInt(btn.dataset.dir)));
  });
  el.querySelectorAll('.dur-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = timelineBlocks.findIndex(x => x.uid === inp.dataset.uid);
      if (idx === -1) return;
      const b = timelineBlocks[idx];
      b.lengthMin = Math.max(1, parseInt(inp.value) || 1);
      persistTimeline();
      renderProgress();
      // If this is the block currently playing, apply the new length live instead of only on
      // the next play-through (which may never come, since each block only plays once per pass).
      if (typeof playerState !== 'undefined' && playerState.currentIndex === idx && playerState.blockStartedAt) {
        playerState.blockBudgetSec = b.lengthMin * 60;
      }
    });
  });
  el.querySelectorAll('.block-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const removedIndex = timelineBlocks.findIndex(x => x.uid === btn.dataset.uid);
      if (removedIndex !== -1) {
        if (playerState.currentIndex === removedIndex) {
          // Removing the block that's actually playing right now -- don't leave it audible for a
          // block that no longer exists in the timeline.
          stopBroadcast();
        } else if (playerState.currentIndex > removedIndex) {
          // A block before the one currently playing was removed -- every later index shifts down
          // by one, so keep currentIndex pointing at the same block that's still actually playing.
          playerState.currentIndex--;
        }
      }
      timelineBlocks = timelineBlocks.filter(x => x.uid !== btn.dataset.uid);
      persistTimeline();
      renderTimeline();
      renderProgress();
    });
  });

  renderProgress();
}

function renderProgress() {
  const total = timelineBlocks.reduce((sum, b) => sum + b.lengthMin, 0);
  const h = Math.floor(total / 60), m = total % 60;
  const timeStr = total === 0 ? '0m' : (h > 0 ? `${h}h ${m}m` : `${m}m`);
  const n = timelineBlocks.length;
  const metaStr = n === 0 ? '' : `total &middot; ${n} block${n !== 1 ? 's' : ''}`;
  document.getElementById('progress-label').innerHTML =
    `<span class="progress-time">${timeStr}</span>${metaStr ? `<span class="progress-meta">${metaStr}</span>` : ''}`;
  renderTimelineRuler();
}

function renderTimelineRuler() {
  const ruler = document.getElementById('timeline-ruler');
  if (!ruler) return;
  const total = timelineBlocks.reduce((s, b) => s + b.lengthMin, 0);
  if (!total) { ruler.style.display = 'none'; return; }
  ruler.style.display = 'flex';
  ruler.innerHTML = timelineBlocks.map(b => {
    const pct = (b.lengthMin / total * 100).toFixed(2);
    const color = CATEGORY_COLORS[b.category] || 'var(--accent)';
    return `<div style="width:${pct}%;background:${color};opacity:0.75;flex-shrink:0;"></div>`;
  }).join('');
}

function persistTimeline() { save('airtime_timeline_v1', timelineBlocks); }

// "Rundowns" (broadcast-industry term for a planned segment lineup) are named, saved timeline
// presets -- they store sourceId + lengthMin per block, NOT specific episodes, so loading one
// later and hitting Play always grabs whatever's currently latest for date-sensitive/rolling
// sources (e.g. "My 8am Commute" always plays *today's* NPR Hourly News, not the one from when it
// was saved).
function renderRundownSelect() {
  const sel = document.getElementById('rundown-select');
  const current = sel.value;
  sel.innerHTML = '<option value="">Load a saved broadcast…</option>' +
    rundowns.map(r => `<option value="${r.id}">${escapeHtml(r.name)}</option>`).join('');
  if (rundowns.some(r => r.id === current)) sel.value = current;
}

// ---------- Drop handling ----------
const timelineEl = document.getElementById('timeline');

timelineEl.addEventListener('dragover', e => {
  e.preventDefault();
  timelineEl.classList.add('drag-over');
});
timelineEl.addEventListener('dragleave', () => timelineEl.classList.remove('drag-over'));

timelineEl.addEventListener('drop', e => {
  e.preventDefault();
  timelineEl.classList.remove('drag-over');

  const reorderUid = e.dataTransfer.getData('text/x-reorder');
  if (reorderUid) {
    // reordering within the timeline: figure out drop target index by mouse position
    const afterEl = getDragAfterElement(timelineEl, e.clientX, e.clientY);
    const draggedIdx = timelineBlocks.findIndex(b => b.uid === reorderUid);
    if (draggedIdx === -1) return;
    const [dragged] = timelineBlocks.splice(draggedIdx, 1);
    if (afterEl == null) {
      timelineBlocks.push(dragged);
    } else {
      const afterUid = afterEl.dataset.uid;
      const afterIdx = timelineBlocks.findIndex(b => b.uid === afterUid);
      timelineBlocks.splice(afterIdx, 0, dragged);
    }
    persistTimeline();
    renderTimeline();
    return;
  }

  addSourceToTimeline(e.dataTransfer.getData('text/plain'));
});

// Shared by both the drag-and-drop handler and the tap-to-add "+" button on each source card —
// native HTML5 drag-and-drop doesn't fire on touchscreens at all, so the "+" button is the only
// way to build a timeline on a phone.
function addSourceToTimeline(sourceId) {
  const src = SOURCES.find(s => s.id === sourceId);
  if (!src) return;
  timelineBlocks.push({
    uid: 'b' + Date.now() + Math.random().toString(36).slice(2, 7),
    sourceId: src.id,
    name: src.name,
    category: src.category,
    lengthMin: src.flexible ? 30 : src.lengthMin,
  });
  trackRecentSource(src.id);
  persistTimeline();
  renderTimeline();
  renderLibrary();
}

function moveBlock(uid, direction) {
  const idx = timelineBlocks.findIndex(b => b.uid === uid);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= timelineBlocks.length) return;
  [timelineBlocks[idx], timelineBlocks[newIdx]] = [timelineBlocks[newIdx], timelineBlocks[idx]];
  persistTimeline();
  renderTimeline();
}

// The timeline now wraps left-to-right like real text, not a strict vertical stack, so "where do I
// drop this" needs both axes: find the closest block whose center is later in reading order (same
// row and further right, or an earlier position in a later row) and insert before it.
function getDragAfterElement(container, x, y) {
  const els = [...container.querySelectorAll('.block:not(.dragging)')];
  let closest = { distance: Infinity, element: null };
  for (const child of els) {
    const box = child.getBoundingClientRect();
    const centerX = box.left + box.width / 2;
    const centerY = box.top + box.height / 2;
    const sameRow = Math.abs(centerY - y) <= box.height / 2;
    const isAfterInFlow = centerY > y + 4 || (sameRow && centerX > x);
    if (!isAfterInFlow) continue;
    const dx = centerX - x, dy = centerY - y;
    const distance = dx * dx + dy * dy;
    if (distance < closest.distance) closest = { distance, element: child };
  }
  return closest.element;
}

// ---------- Controls ----------
document.getElementById('search').addEventListener('input', e => {
  searchText = e.target.value;
  renderLibrary();
});
document.getElementById('rundown-save-btn').addEventListener('click', () => {
  if (timelineBlocks.length === 0) { alert('Your timeline is empty — nothing to save.'); return; }
  const name = prompt('Name this broadcast (e.g. "My 8am Commute"):');
  if (!name || !name.trim()) return;
  const rundown = {
    id: 'rundown-' + Date.now(),
    name: name.trim(),
    blocks: timelineBlocks.map(b => ({ sourceId: b.sourceId, lengthMin: b.lengthMin })),
  };
  rundowns.push(rundown);
  save('airtime_rundowns_v1', rundowns);
  renderRundownSelect();
  document.getElementById('rundown-select').value = rundown.id;
});
// Selecting a saved broadcast loads it immediately -- a separate "Load" button next to the
// dropdown was a redundant extra click doing the same job as picking from the list. The existing
// confirm() below still guards against accidentally clobbering an in-progress timeline.
document.getElementById('rundown-select').addEventListener('change', (e) => {
  const sel = e.target;
  const id = sel.value;
  if (!id) return;
  const r = rundowns.find(x => x.id === id);
  if (!r) return;
  if (timelineBlocks.length > 0 && !confirm('Replace your current timeline with "' + r.name + '"?')) {
    sel.value = '';
    return;
  }
  if (typeof stopBroadcast === 'function') stopBroadcast();
  // Fresh uids, and re-hydrate name/category from the CURRENT catalog rather than trusting a
  // stale snapshot -- a source's display info (or existence) may have changed since this was saved.
  timelineBlocks = r.blocks.map(b => {
    const src = SOURCES.find(s => s.id === b.sourceId);
    return {
      uid: 'b' + Date.now() + Math.random().toString(36).slice(2, 7),
      sourceId: b.sourceId,
      name: src ? src.name : b.sourceId,
      category: src ? src.category : '',
      lengthMin: b.lengthMin,
    };
  });
  persistTimeline();
  renderTimeline();
});
document.getElementById('rundown-delete-btn').addEventListener('click', () => {
  const id = document.getElementById('rundown-select').value;
  if (!id) { alert('Pick a saved broadcast from the list first.'); return; }
  const r = rundowns.find(x => x.id === id);
  if (!r) return;
  if (!confirm('Delete the "' + r.name + '" broadcast? This can\'t be undone.')) return;
  rundowns = rundowns.filter(x => x.id !== id);
  save('airtime_rundowns_v1', rundowns);
  renderRundownSelect();
});
document.getElementById('clear-timeline-btn').addEventListener('click', () => {
  if (timelineBlocks.length === 0) return;
  if (!confirm('Clear all ' + timelineBlocks.length + ' blocks from your timeline?')) return;
  if (typeof stopBroadcast === 'function') stopBroadcast();
  timelineBlocks = [];
  persistTimeline();
  renderTimeline();
});
document.getElementById('copy-log-btn').addEventListener('click', async () => {
  if (playbackLog.length === 0) { alert('Nothing in the log yet.'); return; }
  const text = playbackLog.map(e => `[${e.time}] ${e.message}`).join('\n');
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-log-btn');
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = original; }, 1500);
  } catch (e) {
    // Clipboard API can be blocked (permissions, insecure context) -- fall back to a selectable prompt
    prompt('Copy this log (Ctrl+A, Ctrl+C):', text);
  }
});
document.getElementById('custom-radio-add').addEventListener('click', () => {
  const input = document.getElementById('custom-radio-query');
  addCustomRadioChannel(input.value);
  input.value = '';
});
document.getElementById('custom-radio-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('custom-radio-add').click();
});
document.getElementById('export-timeline-btn').addEventListener('click', () => {
  if (timelineBlocks.length === 0) { alert('Your timeline is empty — nothing to export.'); return; }
  const payload = { airtimeExportVersion: 1, blocks: timelineBlocks };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'airtime-broadcast-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('import-timeline-btn').addEventListener('click', () => {
  document.getElementById('import-timeline-input').click();
});
document.getElementById('import-timeline-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = ''; // allow re-importing the same filename later
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.blocks)) throw new Error('File doesn\'t look like an Airtime export (missing "blocks" array)');
    const valid = data.blocks.every(b => b && typeof b.sourceId === 'string' && typeof b.lengthMin === 'number');
    if (!valid) throw new Error('File doesn\'t look like an Airtime export (malformed block entries)');
    if (timelineBlocks.length > 0 && !confirm('Replace your current ' + timelineBlocks.length + '-block timeline with the ' + data.blocks.length + ' blocks from this file?')) return;
    if (typeof stopBroadcast === 'function') stopBroadcast();
    timelineBlocks = data.blocks; // any legacy targetMinutes field in an old export is just ignored
    persistTimeline();
    renderTimeline();
  } catch (err) {
    alert('Could not import this file: ' + err.message);
  }
});

// ---------- Podcast RSS fetching ----------
// Podcast feeds almost never set Access-Control-Allow-Origin for browser JS, so we try direct
// first, then our own dedicated Cloudflare Worker (cors-proxy-worker.js -- reliable since it's not
// shared with the rest of the internet), then fall back to free public proxies as a last resort.
// Note: the Worker only allows requests from the production origin (njf520.github.io), so it
// won't work when testing locally on localhost -- that's intentional, not a bug.
const CORS_PROXIES = [
  url => url,
  url => `https://airtime-cors-proxy.njf520.workers.dev/?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithTimeout(url, opts, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...opts, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

// Free third-party CORS proxies have no reliability guarantee — one occasionally returns its own
// error page (HTML, JSON, "rate limited", etc.) with a 200 status instead of the real feed. Check
// the response actually looks like XML before accepting it, so a bad proxy falls through to the
// next one instead of silently poisoning the result.
function looksLikeXml(text) {
  const head = text.slice(0, 500).trimStart();
  return head.startsWith('<?xml') || /^<(rss|feed)[\s>]/i.test(head) || /<(rss|feed)[\s>]/i.test(head);
}

async function fetchTextWithProxiesOnce(url) {
  let lastErr;
  for (const wrap of CORS_PROXIES) {
    try {
      const res = await fetchWithTimeout(wrap(url), { cache: 'no-store' }, 15000);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (text && text.trim().length > 0 && looksLikeXml(text)) return text;
      if (text && text.trim().length > 0) throw new Error('Response did not look like a valid feed (possibly a proxy error page)');
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('All fetch attempts failed');
}

// Every proxy failing in the same pass is usually transient (a shared rate-limit window, a
// momentary outage) rather than a real dead feed — reported live: all 4 proxies returned bad
// content on one machine while the same feed worked fine moments later elsewhere. One retry pass
// after a short pause resolves most of these without the user needing to manually retry.
async function fetchTextWithProxies(url) {
  try {
    return await fetchTextWithProxiesOnce(url);
  } catch (e) {
    await new Promise(r => setTimeout(r, 1500));
    return await fetchTextWithProxiesOnce(url);
  }
}

async function resolveArchiveOrgAudio(identifier) {
  const res = await fetchWithTimeout('https://archive.org/metadata/' + identifier, {}, 12000);
  if (!res.ok) throw new Error('Archive.org metadata lookup failed');
  const data = await res.json();
  const files = (data && data.files) || [];
  const mp3 = files.find(f => (f.format || '').toUpperCase().includes('MP3') || (f.name || '').toLowerCase().endsWith('.mp3'));
  if (!mp3) return null;
  return `https://archive.org/download/${identifier}/${encodeURIComponent(mp3.name)}`;
}

// SomaFM's per-channel .pls filenames don't follow one consistent {id}{bitrate}.pls pattern
// (e.g. Metal Detector's highest-quality MP3 playlist is metal.pls, not metal128.pls) — safer to
// look the channel up in their authoritative channel list and use whatever playlist URL it
// actually publishes, rather than guessing a filename. Cached in-memory since it rarely changes
// and every channel resolution would otherwise re-fetch the same ~46-channel JSON file.
let somaFmChannelsCache = null;
async function getSomaFmChannels() {
  if (somaFmChannelsCache) return somaFmChannelsCache;
  const res = await fetchWithTimeout('https://api.somafm.com/channels.json', {}, 10000);
  if (!res.ok) throw new Error('SomaFM channel list lookup failed');
  const data = await res.json();
  somaFmChannelsCache = data.channels || [];
  return somaFmChannelsCache;
}

async function resolveSomaFmStream(channelId) {
  const channels = await getSomaFmChannels();
  const channel = channels.find(c => c.id === channelId);
  if (!channel) throw new Error('SomaFM channel "' + channelId + '" not found');
  const playlist = (channel.playlists || []).find(p => p.format === 'mp3') || channel.playlists[0];
  if (!playlist) throw new Error('No playlist published for SomaFM channel "' + channelId + '"');
  const res = await fetchWithTimeout(playlist.url, {}, 10000);
  if (!res.ok) throw new Error('SomaFM playlist file fetch failed');
  const text = await res.text();
  const match = text.match(/File1=(\S+)/i);
  if (!match) throw new Error('Could not find a stream URL in SomaFM playlist file');
  return { audioUrl: match[1].trim(), title: 'SomaFM: ' + channel.title };
}

// Radio-Browser (radio-browser.info) is a free, open, community-run directory of internet radio
// stations -- no developer account, API key, or per-user auth needed, unlike Spotify. Its official
// entry point (all.api.radio-browser.info) DNS-round-robins across whichever mirror servers are
// currently healthy; de1/de2 are listed as explicit fallbacks in case that entry point itself is
// ever unreachable from a given network. If both of those ever go stale, the current mirror list
// can be found by resolving all.api.radio-browser.info or checking api.radio-browser.info.
const RADIO_BROWSER_HOSTS = [
  'https://all.api.radio-browser.info',
  'https://de1.api.radio-browser.info',
  'https://de2.api.radio-browser.info',
];

// Tries a tag search first (genre/mood/decade -- what every built-in Music source uses), then
// falls back to a name search (so a custom channel typed as a station or artist name still has a
// chance of matching something), trying each mirror host in turn like the CORS proxy fallback
// chain elsewhere in this file.
async function radioBrowserTry(host, params) {
  try {
    const res = await fetchWithTimeout(host + '/json/stations/search?' + new URLSearchParams(params), {}, 8000);
    if (!res.ok) return [];
    const stations = await res.json();
    return Array.isArray(stations) ? stations : [];
  } catch (e) {
    return [];
  }
}

// A handful of Radio-Browser's most-clicked stations are generic "oldies" grab-bags tagged with
// half a dozen different decades at once (e.g. a station tagged 60s,70s,80s,90s all together).
// Reported live: picking "1990s Music" played 1970s tracks, because exactly this kind of
// multi-decade station was the clickcount-sorted #1 hit for the "90s" tag despite not being
// decade-specific at all. Deprioritize (not fully exclude, in case nothing else is left) any
// station tagged with 3+ distinct decades.
const DECADE_TAG_RE = /^(50s|60s|70s|80s|90s|00s|2000s|2010s|50's|60's|70's|80's|90's)$/;
function filterWithFallback(stations, predicate) {
  const filtered = stations.filter(predicate);
  return filtered.length > 0 ? filtered : stations;
}
function hasFocusedDecadeTags(s) {
  const decadeCount = new Set(
    (s.tags || '').split(',').map(t => t.trim()).filter(t => DECADE_TAG_RE.test(t))
  ).size;
  return decadeCount <= 2;
}
// Radio-Browser's own ?language= param does a substring match, so a station self-tagged
// "english,german" still passes language=english -- confirmed live that this let a bilingual
// German station through as the #1 "90s" result, which likely explains reported Spanish/German DJ
// chatter between songs (the language field is self-reported and not verified against the actual
// audio anyway, so this is a best-effort signal, not a guarantee). Requiring the field to be
// EXACTLY "english" -- not just contain it -- is a meaningfully stronger filter than the API's own
// language param.
function isMonolingualEnglish(s) {
  const langs = (s.language || '').split(',').map(l => l.trim().toLowerCase()).filter(Boolean);
  return langs.length === 1 && langs[0] === 'english';
}
function improveStationQuality(stations) {
  return filterWithFallback(filterWithFallback(stations, isMonolingualEnglish), hasFocusedDecadeTags);
}

async function radioBrowserSearchExact(query, limit) {
  const commonParams = { limit: String(limit), hidebroken: 'true', order: 'clickcount', reverse: 'true' };
  for (const host of RADIO_BROWSER_HOSTS) {
    // English-first, tag search: an unfiltered genre/mood tag search skews heavily toward
    // whichever country dominates that tag in Radio-Browser's dataset (often German or French
    // stations for a broad tag like "rock"), and since results are sorted by clickcount, the same
    // few big multi-tag European stations kept winning completely different genre searches --
    // e.g. one German station tagged both "rock" and "80s" was the #1 hit for BOTH, so two
    // different Music blocks resolved to the literal same (non-English) station. Verified live
    // that adding language=english fixes both problems at once for every genre/decade/mood tag in
    // the catalog, without zeroing out results for a niche one (still returns results for
    // something as narrow as "kpop").
    let stations = improveStationQuality(await radioBrowserTry(host, { ...commonParams, tag: query, language: 'english' }));
    if (stations.length > 0) return stations;
    stations = improveStationQuality(await radioBrowserTry(host, { ...commonParams, tag: query }));
    if (stations.length > 0) return stations;
    stations = improveStationQuality(await radioBrowserTry(host, { ...commonParams, name: query, language: 'english' }));
    if (stations.length > 0) return stations;
    stations = improveStationQuality(await radioBrowserTry(host, { ...commonParams, name: query }));
    if (stations.length > 0) return stations;
  }
  return [];
}

async function radioBrowserSearch(query, limit = 15) {
  const stations = await radioBrowserSearchExact(query, limit);
  // Must check for *playable* candidates, not just non-empty station lists. Radio-Browser can return
  // stations for a tag (e.g. "1990s") that are all HLS streams or missing url_resolved -- those
  // would pass the station-count check but get filtered to zero by radioBrowserStationsToCandidates,
  // producing a silent "No working stations" error at play time. Using the candidate filter here
  // ensures a result is only accepted if at least one stream would actually be playable.
  if (radioBrowserStationsToCandidates(stations).length > 0) return stations;
  // Radio-Browser tags are individual words, not compound phrases -- fall back to each word.
  const words = [...new Set(query.split(/\s+/).filter(w => w.length > 2))];
  for (const word of words) {
    if (word.toLowerCase() === query.trim().toLowerCase()) continue;
    const wordStations = await radioBrowserSearchExact(word, limit);
    if (radioBrowserStationsToCandidates(wordStations).length > 0) return wordStations;
  }
  return [];
}

// Radio-Browser's own health-checker follows playlist-wrapper (.pls/.m3u) redirects and stores the
// actual resolved stream URL in url_resolved -- prefer that over the raw url field. Also filter out
// HLS streams (.m3u8): plain <audio src> can't play those in Chrome/Firefox (only Safari supports
// HLS natively), and this app has no MSE/hls.js player to handle them.
function radioBrowserStationsToCandidates(stations) {
  return stations
    .filter(s => s.hls !== 1 && s.url_resolved && !/\.(m3u8?|pls)(\?|$)/i.test(s.url_resolved))
    .map(s => ({ audioUrl: s.url_resolved, title: s.name + (s.country ? ' — ' + s.country : '') }));
}

// ---------- ICY metadata (live track info from radio streams) ----------
// Internet radio streams embed artist+title in-band via ICY metadata: the server interleaves
// a metadata block every <icy-metaint> bytes of audio data. To read it we do a separate fetch
// (distinct from the <audio> element's own stream) with the Icy-MetaData:1 request header,
// accumulate enough bytes to reach the first metadata block, parse StreamTitle, then abort.
// This only works when the stream server responds to the CORS preflight for that custom header
// (many do; those that don't get a CORS error we silently catch). Best-effort: if it fails for
// any reason the Now Playing display just keeps showing the station name instead of the track.
async function fetchIcyTitle(url) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 9000);
  try {
    const res = await fetch(url, { headers: { 'Icy-MetaData': '1' }, signal: controller.signal });
    const metaIntStr = res.headers.get('icy-metaint');
    if (!metaIntStr) return null;
    const metaInt = parseInt(metaIntStr, 10);
    if (!metaInt || metaInt > 131072) return null;
    const reader = res.body.getReader();
    const chunks = [];
    let totalBytes = 0;
    // Accumulate metaInt (audio) + 1 (length byte) + up to 4080 (metadata) bytes.
    while (totalBytes < metaInt + 4081) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      totalBytes += value.length;
    }
    reader.cancel().catch(() => {});
    const buf = new Uint8Array(totalBytes);
    let off = 0;
    for (const c of chunks) { buf.set(c, off); off += c.length; }
    if (buf.length <= metaInt) return null;
    const lenByte = buf[metaInt];
    if (!lenByte) return null;
    const metaLen = lenByte * 16;
    if (buf.length < metaInt + 1 + metaLen) return null;
    const metaStr = new TextDecoder().decode(buf.slice(metaInt + 1, metaInt + 1 + metaLen)).replace(/\0+$/, '');
    const m = metaStr.match(/StreamTitle='([^']*)'/);
    return (m && m[1].trim()) || null;
  } catch {
    return null;
  } finally {
    clearTimeout(timer);
  }
}

let icyPoller = null;
function startIcyPolling(url) {
  stopIcyPolling();
  const poll = () => {
    fetchIcyTitle(url).then(title => {
      if (!playerState.playing || !title) return;
      const el = document.getElementById('np-episode');
      if (el) el.textContent = title;
    });
  };
  poll();
  icyPoller = setInterval(poll, 25000);
}
function stopIcyPolling() {
  if (icyPoller) { clearInterval(icyPoller); icyPoller = null; }
}

async function fetchRandomArchiveItemAudio(identifier) {
  const res = await fetchWithTimeout('https://archive.org/metadata/' + identifier, {}, 12000);
  if (!res.ok) throw new Error('Archive.org metadata lookup failed');
  const data = await res.json();
  const files = (data.files || []).filter(f => (f.format || '').toUpperCase().includes('MP3'));
  if (files.length === 0) throw new Error('No MP3 files found in this Archive.org item');
  const pick = files[Math.floor(Math.random() * files.length)];
  const title = pick.title || pick.name.replace(/\.mp3$/i, '').trim();
  return { audioUrl: `https://archive.org/download/${identifier}/${encodeURIComponent(pick.name)}`, title };
}

function yearsDescending(startYear, endYear) {
  const arr = [];
  for (let y = endYear; y >= startYear; y--) arr.push(y);
  return arr;
}

// Shows that ran daily/weekly for years but no longer produce new episodes still have real
// archived audio filed under their *original* broadcast date. For "today's edition," we build
// one candidate URL per year the show existed (for today's month+day) and try them newest-first —
// see tryLoadAudio(), which uses the <audio> element's own success/error events to probe, since a
// separate existence-check fetch() would hit the same CORS wall as everything else.
function buildWritersAlmanacCandidates() {
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const monthName = now.toLocaleString('en-US', { month: 'long' });
  return yearsDescending(1993, 2016).map(y => ({
    audioUrl: `https://download.publicradio.org/podcast/writers_almanac/${y}/${mm}/twa_${y}${mm}${dd}_64.mp3`,
    title: `The Writer's Almanac for ${monthName} ${now.getDate()}, ${y}`,
  }));
}

// Unlike StarDate (must match tonight's sky) or the Writer's Almanac (a specific day-in-history),
// A Prairie Home Companion isn't date-sensitive — any episode works. So instead of anchoring to
// today's date and cycling through years looking for a match (which was slow and often missed,
// since the show aired weekly, not daily), pick a random month/day and try that across years.
function buildPrairieHomeCompanionCandidates() {
  const month = 1 + Math.floor(Math.random() * 12);
  const day = 1 + Math.floor(Math.random() * 28); // avoid month-length edge cases
  const mm = String(month).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  const monthName = new Date(2000, month - 1, 1).toLocaleString('en-US', { month: 'long' });
  return yearsDescending(1980, 2016).map(y => ({
    audioUrl: `https://play.publicradio.org/api-2.0.1/o/phc/${y}/${mm}/${dd}/phc_${y}${mm}${dd}_128.mp3`,
    title: `A Prairie Home Companion, full show — ${monthName} ${day}, ${y}`,
  }));
}

// Tries each candidate in order using the audio element's own load events (avoids a separate
// CORS-sensitive existence check) — returns the first one that actually loads. Also catches a
// candidate in a format the browser can't decode at all (e.g. an .ogg feed on Safari) the same
// way as a network failure, since both just fire 'error' without 'loadedmetadata'.
let probingAudio = false;
async function tryLoadAudio(candidates, myGen, perAttemptTimeoutMs = 12000) {
  probingAudio = true;
  try {
    for (const c of candidates) {
      if (myGen !== undefined && myGen !== playGeneration) {
        throw new Error('Superseded by a newer playback request');
      }
      const ok = await new Promise(resolve => {
        let settled = false;
        const finish = (result) => { if (settled) return; settled = true; cleanup(); resolve(result); };
        const onError = () => finish(false);
        const onReady = () => finish(true);
        const timer = setTimeout(() => finish(false), perAttemptTimeoutMs);
        function cleanup() {
          audioEl.removeEventListener('error', onError);
          audioEl.removeEventListener('loadedmetadata', onReady);
          clearTimeout(timer);
        }
        audioEl.addEventListener('error', onError, { once: true });
        audioEl.addEventListener('loadedmetadata', onReady, { once: true });
        audioEl.src = c.audioUrl;
        audioEl.load();
      });
      if (ok) return c;
    }
    throw new Error(`No working audio found among ${candidates.length} date candidates`);
  } finally {
    probingAudio = false;
  }
}

async function fetchLatestEpisode(feedUrl) {
  if (feedUrl.startsWith('archive-item:')) {
    const r = await fetchRandomArchiveItemAudio(feedUrl.slice('archive-item:'.length));
    return { candidates: [r] };
  }
  if (feedUrl === 'date-archive:writers-almanac') {
    return { candidates: buildWritersAlmanacCandidates() };
  }
  if (feedUrl === 'date-archive:prairie-home-companion') {
    return { candidates: buildPrairieHomeCompanionCandidates() };
  }
  if (feedUrl.startsWith('direct-stream:')) {
    // Always-on internet radio streams with a permanent, stable URL (Radio Paradise, KEXP) —
    // no feed to fetch or parse, just point <audio> straight at it.
    return { candidates: [{ audioUrl: feedUrl.slice('direct-stream:'.length), title: 'Live stream' }] };
  }
  if (feedUrl.startsWith('somafm:')) {
    // Resolved via SomaFM's channel-list API rather than a hardcoded .pls URL, since per-channel
    // playlist filenames don't follow one consistent pattern (see resolveSomaFmStream).
    const r = await resolveSomaFmStream(feedUrl.slice('somafm:'.length));
    return { candidates: [r] };
  }
  if (feedUrl.startsWith('radio-browser:tag:')) {
    // Every Music genre/decade/mood source and every user-added custom channel resolves live via
    // Radio-Browser rather than a fixed station -- return every matching station as a candidate so
    // tryLoadAudio's existing probing skips over any that are dead/broken/unplayable, same as the
    // date-archive candidate lists above.
    const tag = feedUrl.slice('radio-browser:tag:'.length);
    const stations = await radioBrowserSearch(tag);
    const candidates = radioBrowserStationsToCandidates(stations);
    if (candidates.length === 0) throw new Error('No working "' + tag + '" stations found via Radio-Browser');
    return { candidates };
  }
  const xmlText = await fetchTextWithProxies(feedUrl);
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('Feed did not parse as XML');
  const item = doc.querySelector('item') || doc.querySelector('entry');
  if (!item) throw new Error('Feed has no episodes');
  let audioUrl = null;
  const enclosure = item.querySelector('enclosure');
  if (enclosure && enclosure.getAttribute('url')) {
    audioUrl = enclosure.getAttribute('url');
  }
  if (!audioUrl) {
    const mediaContent = item.getElementsByTagNameNS('*', 'content')[0];
    if (mediaContent && mediaContent.getAttribute('url')) audioUrl = mediaContent.getAttribute('url');
  }
  if (!audioUrl) {
    // Internet Archive collection feeds link to an item details page rather than an enclosure —
    // resolve the actual audio file via Archive.org's metadata API.
    const linkEl = item.querySelector('link');
    const link = linkEl ? linkEl.textContent : '';
    const m = link.match(/archive\.org\/details\/([^/?#]+)/);
    if (m) audioUrl = await resolveArchiveOrgAudio(m[1]);
  }
  if (!audioUrl) throw new Error('No audio enclosure found in latest episode');
  const titleEl = item.querySelector('title');
  const title = titleEl ? titleEl.textContent : 'Latest episode';
  return { candidates: [{ audioUrl, title }] };
}

// ---------- Sequencer: walks the timeline, playing each block through the audio element in order ----------
// Incremented at the start of every playBlockAt() call. Async work (fetches, tryLoadAudio's
// candidate loop) checks this before touching shared state like audioEl.src, so a user rapidly
// skipping/stopping can't have a stale in-flight request clobber the current block.
let playGeneration = 0;

let playerState = {
  playing: false,
  currentIndex: -1,
  blockTimer: null,
  tickTimer: null,
  blockStartedAt: null,
  blockBudgetSec: 0,
  blockIsLiveStream: false, // internet-radio only -- infinite, unseekable, needs reconnect on resume
  currentStreamUrl: null,
};
let currentVolume = load('airtime_volume_v1', 80);
const audioEl = new Audio();
audioEl.volume = currentVolume / 100;
audioEl.addEventListener('ended', () => {
  if (playerState.playing) advanceBlock();
});
// Fires for network drops and unsupported/undecodable formats (e.g. a codec Safari iOS can't
// play) once a block is actually playing -- not just during tryLoadAudio's own candidate probing,
// which owns 'error' during that phase via probingAudio and handles it separately.
audioEl.addEventListener('error', () => {
  if (probingAudio) return;
  if (!playerState.playing) return;
  const myGen = playGeneration;
  const name = timelineBlocks[playerState.currentIndex]?.name || '';
  stopTick();
  setNowPlaying(name, '', 'Playback error (unsupported format or connection drop) — skipping in 2s…');
  clearTimeout(playerState.blockTimer);
  playerState.blockTimer = setTimeout(() => { if (myGen === playGeneration) advanceBlock(); }, 2000);
});

document.getElementById('np-volume').value = currentVolume;
document.getElementById('np-volume').addEventListener('input', e => {
  currentVolume = parseInt(e.target.value) || 0;
  save('airtime_volume_v1', currentVolume);
  audioEl.volume = currentVolume / 100;
});

function setNowPlaying(name, episode, statusText) {
  document.getElementById('now-playing').classList.add('active');
  document.getElementById('np-name').textContent = name;
  document.getElementById('np-episode').textContent = episode || '';
  document.getElementById('np-status').textContent = statusText || '';
  // Status messages (including error/skip reasons) flash by for only ~2s on screen before the
  // sequencer moves on, making them impossible to read or copy in time — every one also goes into
  // a persistent, copyable log instead.
  if (statusText) logPlayback(name + ': ' + statusText);
}

let playbackLog = [];
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function logPlayback(message) {
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  // Every failure/skip path in the sequencer ends its message with "skipping" (see playBlockAt) --
  // simpler and more robust than trying to keyword-match every possible error phrasing.
  const level = /skipping/i.test(message) ? 'error' : /playing/i.test(message) ? 'ok' : 'neutral';
  playbackLog.push({ time, message, level });
  if (playbackLog.length > 200) playbackLog.shift(); // cap unbounded growth over a long session
  const el = document.getElementById('playback-log');
  el.innerHTML = playbackLog.map(e =>
    `<div class="log-entry log-${e.level}"><span class="log-time">${e.time}</span>${escapeHtml(e.message)}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
  if (level === 'error') console.error('[Airtime]', message);
}

function updateScrub(frac) {
  document.getElementById('np-scrub-fill').style.width = Math.min(100, Math.max(0, frac * 100)) + '%';
}

function formatTime(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function startTick() {
  clearInterval(playerState.tickTimer);
  playerState.tickTimer = setInterval(() => {
    if (!playerState.blockStartedAt || !playerState.blockBudgetSec) return;
    const elapsed = (Date.now() - playerState.blockStartedAt) / 1000;
    // For fixed content, show progress against the real duration once known (more accurate than
    // the assigned estimate), falling back to the estimate before metadata loads. This is always
    // scoped to the CURRENT block only, never the whole broadcast.
    const realDuration = isFinite(audioEl.duration) ? audioEl.duration : null;
    const scrubDenominator = (!playerState.blockIsFlexible && realDuration) ? realDuration : playerState.blockBudgetSec;
    updateScrub(elapsed / scrubDenominator);
    document.getElementById('np-elapsed').textContent = formatTime(elapsed);
    document.getElementById('np-total').textContent = formatTime(scrubDenominator);
    const pct = Math.min(100, (elapsed / scrubDenominator) * 100);
    document.querySelector('#timeline .block.playing')?.style.setProperty('--progress', pct + '%');
    if (playerState.blockIsFlexible) {
      if (elapsed >= playerState.blockBudgetSec) advanceBlock();
    } else if (elapsed >= playerState.blockBudgetSec * 2 + 300) {
      // Safety net only -- fixed content normally ends via the 'ended' event, not this tick. If
      // we're here, something stalled (e.g. a stream that never fires 'ended'); don't hang the
      // rest of the broadcast forever waiting for it.
      advanceBlock();
    }
  }, 1000);
}
function stopTick() { clearInterval(playerState.tickTimer); }

function updatePlayButtonLabel() {
  const btn = document.getElementById('play-broadcast-btn');
  if (playerState.currentIndex === -1) { btn.textContent = '▶ Play Broadcast'; return; }
  btn.textContent = playerState.playing ? '⏸ Pause' : '▶ Resume';
}

async function playBroadcastFromStart() {
  if (timelineBlocks.length === 0) { alert('Add some blocks to your timeline first.'); return; }
  playerState.playing = true;
  await playBlockAt(0);
}

// Abrupt cuts (audioEl.pause() with no warning) are jarring mid-song/mid-sentence -- professional
// radio automation always fades. Quick ~1.2s volume fade-out before actually stopping, for
// whichever source is currently playing; skipped entirely if nothing is playing yet (e.g. the
// very first block of a broadcast).
async function fadeOutCurrentAudio(myGen, durationMs = 1200) {
  const steps = 12;
  const stepMs = durationMs / steps;
  const targetVolume = currentVolume / 100;
  if (!audioEl.paused) {
    for (let i = 1; i <= steps; i++) {
      if (myGen !== playGeneration) return; // superseded mid-fade -- let the newer call take over
      await new Promise(r => setTimeout(r, stepMs));
      audioEl.volume = Math.max(0, targetVolume * (1 - i / steps));
    }
    audioEl.pause();
    audioEl.volume = targetVolume;
  }
}

async function playBlockAt(index) {
  const myGen = ++playGeneration;
  clearTimeout(playerState.blockTimer);
  stopTick();
  stopIcyPolling();
  await fadeOutCurrentAudio(myGen);
  if (myGen !== playGeneration) return; // superseded while fading out

  if (index >= timelineBlocks.length) {
    playerState.playing = false;
    playerState.currentIndex = -1;
    setNowPlaying('Broadcast finished', '', '');
    updatePlayButtonLabel();
    renderTimeline();
    return;
  }

  playerState.currentIndex = index;
  const block = timelineBlocks[index];
  const src = SOURCES.find(s => s.id === block.sourceId);
  renderTimeline();
  updatePlayButtonLabel();

  if (!src) {
    setNowPlaying(block.name, '', 'This source no longer exists in the catalog — skipping in 2s…');
    playerState.blockTimer = setTimeout(() => advanceBlock(), 2000);
    return;
  }

  if (src.sourceType === 'podcast-rss' || src.sourceType === 'archive' || src.sourceType === 'internet-radio') {
    if (!src.feedUrl) {
      setNowPlaying(block.name, '', 'No working feed for this source — skipping in 2s…');
      playerState.blockTimer = setTimeout(() => advanceBlock(), 2000);
      return;
    }
    setNowPlaying(block.name, 'Loading latest episode…', '');
    try {
      const { candidates } = await fetchLatestEpisode(src.feedUrl);
      if (myGen !== playGeneration) return;
      if (candidates.length > 1) setNowPlaying(block.name, 'Checking for a working recording…', '');
      const winner = await tryLoadAudio(candidates, myGen);
      if (myGen !== playGeneration) return;
      // Fixed-length content (a podcast/OTR episode with a real end) should play to its natural
      // finish rather than being cut off at the assigned estimate -- a "5 min" news update that's
      // actually 5:22 shouldn't get faded out 22 seconds early. Internet radio streams (including
      // Radio-Browser tag/mood/decade channels) are the opposite: they're infinite and marked
      // flexible in the catalog, so the budget cutoff is the whole point there.
      playerState.blockIsFlexible = !!src.flexible;
      playerState.blockIsLiveStream = src.sourceType === 'internet-radio';
      playerState.currentStreamUrl = winner.audioUrl;
      playerState.blockStartedAt = Date.now();
      playerState.blockBudgetSec = block.lengthMin * 60;
      await audioEl.play();
      if (myGen !== playGeneration) return;
      setNowPlaying(block.name, winner.title, `Playing (feed status: ${src.feedStatus})`);
      startTick();
      if (playerState.blockIsLiveStream) startIcyPolling(winner.audioUrl);
    } catch (err) {
      if (myGen !== playGeneration) return;
      setNowPlaying(block.name, '', 'Could not load this feed (' + err.message + ') — skipping in 2s…');
      playerState.blockTimer = setTimeout(() => advanceBlock(), 2000);
    }
  } else {
    advanceBlock();
  }
}

function advanceBlock() {
  stopTick();
  if (!playerState.playing) return;
  playBlockAt(playerState.currentIndex + 1);
}

function togglePlayPause() {
  if (playerState.currentIndex === -1) { playBroadcastFromStart(); return; }
  if (audioEl.paused) {
    // A live radio stream has no fixed buffer to resume from -- just calling play() again
    // replays whatever got buffered while paused, which surfaces as a jarring jump forward
    // once it catches up. Reconnecting fresh lands back at the live edge instead.
    if (playerState.blockIsLiveStream && playerState.currentStreamUrl) {
      audioEl.src = playerState.currentStreamUrl;
      audioEl.load();
      audioEl.play().catch(() => {});
    } else {
      audioEl.play();
    }
    playerState.playing = true;
  } else {
    audioEl.pause();
    if (playerState.blockIsLiveStream) {
      audioEl.removeAttribute('src');
      audioEl.load();
    }
    playerState.playing = false;
  }
  updatePlayButtonLabel();
}

function stopBroadcast() {
  playGeneration++; // invalidate any in-flight playBlockAt/tryLoadAudio work
  playerState.playing = false;
  clearTimeout(playerState.blockTimer);
  stopTick();
  stopIcyPolling();
  audioEl.pause();
  audioEl.removeAttribute('src');
  playerState.currentIndex = -1;
  playerState.blockIsLiveStream = false;
  playerState.currentStreamUrl = null;
  document.getElementById('now-playing').classList.remove('active');
  document.getElementById('np-elapsed').textContent = '0:00';
  document.getElementById('np-total').textContent = '0:00';
  updateScrub(0);
  updatePlayButtonLabel();
  renderTimeline();
}

document.getElementById('play-broadcast-btn').addEventListener('click', () => {
  if (playerState.currentIndex === -1) playBroadcastFromStart();
  else togglePlayPause();
});
document.getElementById('np-playpause').addEventListener('click', togglePlayPause);
document.getElementById('np-next').addEventListener('click', () => { playerState.playing = true; playBlockAt(playerState.currentIndex + 1); });
document.getElementById('np-prev').addEventListener('click', () => { playerState.playing = true; playBlockAt(Math.max(0, playerState.currentIndex - 1)); });
document.getElementById('np-stop').addEventListener('click', stopBroadcast);

// ---------- Init ----------
renderFilters();
renderLibrary();
renderTimeline();
renderRundownSelect();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.error('Service worker registration failed', e));
  });
}
</script>
</body>
