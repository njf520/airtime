<script>
// Set the theme before first paint (and before the <style> below is even parsed) so there's no
// flash of the wrong theme on load. Falls back to the OS-level light/dark preference if the user
// has never explicitly toggled it here.
(function() {
  var saved = localStorage.getItem('airtime_theme_v1');
  var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = theme;
})();
</script>
<style>
  :root {
    --bg: #1b1915;
    --bg-hi: #262219;
    --panel: #221e19;
    --panel-2: #282520;
    --border: #3a352e;
    --text: #ece5d8;
    --text-dim: #8f8676;
    --accent: #e0a13c;
    --accent-label: #e0a13c;
    --accent-tint: rgba(224,161,60,0.08);
    --good: #8bab5f;
    --warn: #e0a13c;
    --bad: #d9847f;
    /* Subtle overlay tints used for chips/stripes -- a light-on-dark tint reads as "faint" on a
       dark surface but is nearly invisible on a light one, so this flips per theme rather than
       being hardcoded at every call site. */
    --tint-weak: rgba(255,255,255,0.05);
    --tint-strong: rgba(255,255,255,0.10);
    --selection-bg: rgba(224,161,60,0.28);
    --play-shadow: 0 10px 26px -10px rgba(224,161,60,0.65);
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #efe8da;
    --bg-hi: #fbf7ee;
    --panel: #fffdf8;
    --panel-2: #f6f1e7;
    --border: #e4dccc;
    --text: #2b2620;
    --text-dim: #8a8172;
    --accent: #d99a34;
    --accent-label: #b07d24;
    --accent-tint: rgba(184,125,36,0.08);
    --good: #6f8a4f;
    --warn: #b07d24;
    --bad: #a84a2c;
    --tint-weak: rgba(43,38,32,0.05);
    --tint-strong: rgba(43,38,32,0.09);
    --selection-bg: rgba(184,125,36,0.24);
    --play-shadow: 0 10px 26px -10px rgba(184,130,40,0.55);
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  ::selection { background: var(--selection-bg); color: var(--text); }
  body {
    margin: 0;
    background: radial-gradient(1200px 620px at 72% -12%, var(--bg-hi), var(--bg) 62%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 34px;
    flex-shrink: 0;
  }
  .brand-bars > div {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
  }
  .brand-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .brand-wordmark {
    font-family: 'Spectral', Georgia, serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
  }
  .header-subtitle {
    display: none;
  }
  .version-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 0;
    vertical-align: baseline;
    background: none;
  }
  /* Timeline on top (full width, so proportional-width blocks have real room to breathe), source
     library below as a browsable grid -- one layout that already matches what the mobile
     breakpoint below used to have to force as a special case. The whole page scrolls naturally
     instead of two independently-scrolling fixed-height panes. */
  main {
    display: flex;
    flex-direction: column;
  }
  #library {
    padding: 20px 40px;
  }
  #library h2, #timeline-col h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent-label);
    margin: 0 0 12px 0;
  }
  .timeline-heading-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .timeline-heading-left { min-width: 0; }
  #timeline-col .timeline-heading-row h2,
  #library .timeline-heading-row h2 { margin: 0 0 8px 0; }
  .timeline-heading-actions { display: flex; gap: 6px; align-items: center; }
  .timeline-heading-actions .btn { font-size: 12px; padding: 5px 10px; }
  #rundown-select {
    font-size: 12px;
    padding: 5px 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    max-width: 160px;
  }
  #search {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    margin-bottom: 10px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
  }
  #custom-radio-form {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  #custom-radio-query {
    flex: 1;
    min-width: 0;
    padding: 7px 9px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
  }
  #custom-radio-add {
    font-size: 12px;
    padding: 6px 10px;
    white-space: nowrap;
  }
  #custom-radio-status {
    font-size: 12px;
    min-height: 18px;
    margin-top: -8px;
    margin-bottom: 8px;
    color: var(--good);
    transition: opacity 0.3s;
  }
  #custom-radio-status.error { color: var(--bad); }
  #custom-radio-status.fade { opacity: 0; }
  #recently-used { margin-bottom: 14px; }
  .recently-used-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent-label);
    margin-bottom: 7px;
  }
  .recently-used-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .recent-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--chip-color, var(--border));
    border-radius: 14px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .recent-chip:hover { border-color: var(--accent); color: var(--accent); }
  .recent-chip-plus { font-size: 13px; opacity: 0.45; line-height: 1; }
  /* On mobile, HTML5 drag-and-drop does not fire on touch at all — swap instructional text. */
  .drag-hint { display: inline; }
  .tap-hint  { display: none; }
  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .cat-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .cat-chip.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  /* A browsable grid uses the full-width library section effectively -- auto-fit lets the column
     count adapt to whatever width is available, from a phone-width single column up to several
     columns on a wide desktop window. */
  #source-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
  }
  .source-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--card-color, var(--accent));
    border-radius: 8px;
    padding: 10px 12px;
    cursor: grab;
    position: relative;
  }
  .source-card:active { cursor: grabbing; }
  .source-card.dragging { opacity: 0.4; }
  .source-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .source-add-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }
  .source-add-btn:hover { border-color: var(--accent); }
  .source-name {
    font-family: 'Spectral', Georgia, serif;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .source-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .tag {
    background: var(--tint-weak);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .tag-network {
    background: var(--accent-tint);
    color: var(--accent);
    font-weight: 600;
  }
  .source-desc {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 30px 10px;
  }
  #timeline-col {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
  }
  #progress-label {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-height: 38px;
  }
  .progress-time {
    font-family: 'Spectral', Georgia, serif;
    font-size: 30px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .progress-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  #timeline-ruler {
    display: none;
    gap: 3px;
    height: 7px;
    margin-bottom: 14px;
  }
  #timeline-ruler > div {
    border-radius: 999px;
  }
  #timeline {
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
    gap: 14px;
    margin-bottom: 8px;
  }
  #timeline.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: 8px;
    border-radius: 10px;
    background: var(--accent-tint);
  }
  .timeline-drop-hint {
    min-width: 130px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-family: 'Spectral', Georgia, serif;
    font-style: italic;
    font-size: 15px;
    text-align: center;
    padding: 16px;
    line-height: 1.4;
    flex-shrink: 0;
    align-self: stretch;
    pointer-events: none;
    opacity: 0.65;
  }
  #timeline.empty .timeline-drop-hint {
    min-width: 260px;
    min-height: 110px;
    padding: 24px 20px;
  }
  /* Visual time-blocking: each block's width is proportional to its length (see renderTimeline's
     inline style), so the timeline reads like a real broadcast log/clock wheel at a glance. */
  .block {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--card-color, var(--accent));
    border-radius: 8px;
    padding: 10px 12px;
    box-sizing: border-box;
    cursor: grab;
    position: relative;
    /* Column layout with the bottom row pushed to the end -- cards in the same row get stretched
       to equal height by #timeline's align-items:stretch (since name-text wrapping differs by
       card width), and without this the duration/remove row would sit at wherever the top content
       happened to end, landing at a different height on every card instead of lining up. */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .block.dragging { opacity: 0.4; }
  .block.playing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .block-progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--tint-weak);
    overflow: hidden;
    border-radius: 0 0 7px 7px;
  }
  .block-progress-fill {
    height: 100%;
    background: var(--card-color, var(--accent));
    width: var(--progress, 0%);
    transition: width 0.95s linear;
  }
  .block-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .block-index {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent-label);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .block-body { flex: 1; min-width: 0; }
  .block-name { font-family: 'Spectral', Georgia, serif; font-size: 15px; font-weight: 500; }
  .block-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--text-dim); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  /* A plain-language badge instead of the old stripe-pattern background -- a texture nobody could
     be expected to decode at a glance. Says exactly what it means: this one's length is yours to
     set (a live stream or an open-ended queue), not a fixed episode with a real runtime. */
  .flex-badge {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--accent);
    background: var(--tint-strong);
    padding: 1px 6px;
    border-radius: 4px;
    cursor: help;
  }
  .block-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-top: 10px;
  }
  .block-duration {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  /* The editable input (flexible blocks) and the plain-text pill (fixed blocks) share the exact
     same box model so the duration control is the same size and sits at the same height either
     way -- previously a bare span next to a bordered input made the two kinds of card look
     inconsistent side by side. */
  .block-duration input,
  .dur-fixed {
    height: 26px;
    box-sizing: border-box;
    padding: 0 6px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
  }
  .block-duration input {
    width: 44px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .dur-fixed {
    background: var(--tint-weak);
    border: 1px solid transparent;
    color: var(--text-dim);
    cursor: help;
  }
  .block-remove {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    width: 26px;
    height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  .block-remove:hover { color: var(--bad); background: var(--tint-weak); }
  .block-move {
    /* Hidden on desktop -- dragging a block is the primary way to reorder there, so a redundant
       pair of arrow buttons per block was pure clutter. Re-shown below at the mobile breakpoint,
       where native HTML5 drag-and-drop doesn't fire on touch at all (see that media query for
       why), so these are the only way to reorder blocks on a phone. */
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    width: 24px;
    height: 24px;
    padding: 0;
  }
  .block-move:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .block-move:disabled { opacity: 0.3; cursor: not-allowed; }
  .feed-badge {
    font-size: 9.5px;
    padding: 1px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .feed-badge.verified { background: rgba(62,207,142,0.15); color: var(--good); }
  .feed-badge.unverified { background: rgba(224,162,51,0.15); color: var(--warn); }
  .feed-badge.none { background: rgba(224,90,90,0.15); color: var(--bad); }
  .header-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: 600; border-radius: 999px; padding: 9px 20px; box-shadow: var(--play-shadow); }
  .btn.primary:hover { opacity: 0.9; }
  .btn.danger:hover { border-color: var(--bad); color: var(--bad); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .icon-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    border-radius: 999px;
  }
  #now-playing {
    display: none;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  #now-playing.active { display: block; }
  #np-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  #np-info { min-width: 0; }
  #np-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  #np-name { font-size: 15px; font-weight: 600; }
  #np-episode { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  #np-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #np-volume {
    width: 70px;
    accent-color: var(--accent);
    margin-right: 4px;
  }
  #np-controls button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 14px;
  }
  #np-controls button:hover { border-color: var(--accent); }
  #np-time-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #np-elapsed, #np-total {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  #np-scrub {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  #np-scrub-fill { height: 100%; background: var(--accent); width: 0%; }
  #np-status { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  /* A raw always-visible log looks like debug output left in place -- tuck it behind a native
     <details> disclosure instead, closed by default, so it's there when you want it without
     cluttering the timeline view by default. */
  #playback-log-wrap {
    flex: 1;
    min-width: 0;
  }
  #playback-log-wrap > summary {
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    opacity: 0.7;
    list-style: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  #playback-log-wrap > summary::-webkit-details-marker { display: none; }
  #playback-log-wrap > summary::before {
    content: '▸';
    font-size: 9px;
    display: inline-block;
    transition: transform 0.15s ease;
    color: var(--text-dim);
    opacity: 0.6;
  }
  #playback-log-wrap[open] > summary::before { transform: rotate(90deg); }
  #playback-log-wrap > summary:hover { opacity: 1; }
  .playback-log-toolbar { display: flex; justify-content: flex-end; margin: 8px 0 0; }
  #playback-log {
    max-height: 170px;
    overflow-y: auto;
    background: var(--panel);

  }
  .log-entry { padding: 2px 0; color: var(--text-dim); }

  .log-time { opacity: 0.6; margin-right: 6px; }
  #copy-log-btn { font-size: 12px; padding: 5px 10px; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 { margin: 0 0 10px 0; font-size: 16px; }
  .modal p { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .modal label { font-size: 12px; color: var(--text-dim); display: block; margin: 12px 0 4px; }
  .modal input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .modal code {
    background: var(--panel);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11.5px;
  }
  footer {
    padding: 20px 40px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-top: 20px;
  }
  #footer-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    padding-top: 3px;
    opacity: 0.65;
    flex-shrink: 0;
  }
  /* Native drag-and-drop doesn't work at all on touchscreens, so the tap-based alternatives below
     (bigger touch targets, ↑/↓ reorder buttons) matter on phones in a way they don't on desktop. */
  @media (max-width: 768px) {
    header {
      padding: 16px 20px;
    }
    #timeline-col, #library {
      padding-left: 20px;
      padding-right: 20px;
    }
    .brand-wordmark { font-size: 22px; }
    .header-buttons {
      width: 100%;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    /* Touch targets under ~40px are notoriously hard to tap precisely on a phone — grow the
       icon-only buttons instead of leaving them at their comfortable-with-a-mouse desktop size. */
    .block-move, .block-remove, .source-add-btn {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
    .block-move { display: inline-flex; align-items: center; justify-content: center; }
    #np-controls button {
      width: 44px;
      height: 44px;
      font-size: 18px;
    }
    /* The proportional-width visual timeline is a desktop thing -- on a narrow phone screen there
       isn't room for meaningful width differences anyway, so fall back to the simpler, already
       touch-optimized full-width stacked list (same as before this feature existed). */
    .block {
      width: 100% !important;
    }
    .drag-hint { display: none; }
    .tap-hint  { display: inline; }
    .timeline-drop-hint {
      min-width: 100%;
      min-height: 80px;
    }
  }
</style>
</head>

// Bump on every deploy (alongside CACHE_NAME in sw.js) so the version badge in the header and
// the service worker's cache both reflect what's actually live.
const VERSION = '3.3.0';
document.getElementById('version-display').textContent = 'v' + VERSION;
(function() {
  const el = document.getElementById('footer-status');
  if (!el) return;
  // Count after SOURCES is defined (this runs inline, SOURCES is declared below)
  // — use a microtask to wait for the rest of the script to execute first.
  Promise.resolve().then(() => {
    const healthy = typeof SOURCES !== 'undefined'
      ? SOURCES.filter(s => s.feedStatus === 'verified').length : 0;
    el.textContent = `Airtime v${VERSION} · ${healthy} feeds healthy`;

})();

// ---------- Theme ----------
// The actual theme attribute is already set pre-paint by the inline <script> in <head> (see
// there for why) -- this just wires up the toggle button to flip it and keep the icon in sync.
function applyThemeButton() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const btn = document.getElementById('theme-toggle-btn');
  btn.textContent = isLight ? '☀' : '☾';
  btn.title = btn.ariaLabel = isLight ? 'Switch to dark mode' : 'Switch to light mode';
}
applyThemeButton();
document.getElementById('theme-toggle-btn').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('airtime_theme_v1', next);
  applyThemeButton();
});

// User-created custom radio channels (any Radio-Browser tag/name search) are appended to SOURCES
// at runtime so every existing code path (library rendering, filtering, playback lookup by id)
// treats them identically to built-in sources with zero special-casing. Persisted separately so
// they survive a reload, then re-merged into SOURCES on the next load.
let customRadioSources = load('airtime_custom_sources_v1', []);
customRadioSources.forEach(cs => SOURCES.push(cs));
let recentSourceIds = load('airtime_recent_sources_v1', []);
function trackRecentSource(id) {
  recentSourceIds = [id, ...recentSourceIds.filter(x => x !== id)].slice(0, 6);
  save('airtime_recent_sources_v1', recentSourceIds);
}
