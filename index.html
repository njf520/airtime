<script>
// Set the theme before first paint (and before the <style> below is even parsed) so there's no
// flash of the wrong theme on load. Falls back to the OS-level light/dark preference if the user
// has never explicitly toggled it here.
(function() {
  var saved = localStorage.getItem('airtime_theme_v1');
  var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = theme;
})();
</script>
<style>
  :root {
    --bg: #1b1915;
    --bg-hi: #262219;
    --panel: #221e19;
    --panel-2: #282520;
    --border: #3a352e;
    --text: #ece5d8;
    --text-dim: #8f8676;
    --accent: #e0a13c;
    --accent-label: #e0a13c;
    --accent-tint: rgba(224,161,60,0.08);
    --good: #8bab5f;
    --warn: #e0a13c;
    --bad: #d9847f;
    /* Subtle overlay tints used for chips/stripes -- a light-on-dark tint reads as "faint" on a
       dark surface but is nearly invisible on a light one, so this flips per theme rather than
       being hardcoded at every call site. */
    --tint-weak: rgba(255,255,255,0.05);
    --tint-strong: rgba(255,255,255,0.10);
    --selection-bg: rgba(224,161,60,0.28);
    --play-shadow: 0 10px 26px -10px rgba(224,161,60,0.65);
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #efe8da;
    --bg-hi: #fbf7ee;
    --panel: #fffdf8;
    --panel-2: #f6f1e7;
    --border: #e4dccc;
    --text: #2b2620;
    --text-dim: #8a8172;
    --accent: #d99a34;
    /* Darkened from #b07d24 -- found during an accessibility pass that the old value only hit
       2.97:1 contrast against --bg in light mode, well under WCAG AA's 4.5:1 for normal text. This
       value measures 5.03:1. Every text-color usage of the plain --accent variable (which measures
       just 2.00:1, badly failing even the 3:1 UI-component threshold) was also switched to this
       variable instead -- dark mode is completely unaffected, since dark mode's --accent-label was
       already identical to --accent there. */
    --accent-label: #825a19;
    --accent-tint: rgba(184,125,36,0.08);
    --good: #6f8a4f;
    --warn: #b07d24;
    --bad: #a84a2c;
    --tint-weak: rgba(43,38,32,0.05);
    --tint-strong: rgba(43,38,32,0.09);
    --selection-bg: rgba(184,125,36,0.24);
    --play-shadow: 0 10px 26px -10px rgba(184,130,40,0.55);
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  ::selection { background: var(--selection-bg); color: var(--text); }
  body {
    margin: 0;
    background: radial-gradient(1200px 620px at 72% -12%, var(--bg-hi), var(--bg) 62%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 34px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .brand-bars > div {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
  }
  .brand-wordmark {
    font-family: 'Spectral', Georgia, serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
    margin: 0; /* now an <h1> -- neutralize the browser's default h1 margin, unrelated to this class's own sizing */
  }
  .header-subtitle {
    display: none;
  }
  .version-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 0;
    vertical-align: baseline;
    background: none;
    align-self: center;
    margin-top: 16px;
  }
  /* Timeline on top (full width, so proportional-width blocks have real room to breathe), source
     library below as a browsable grid -- one layout that already matches what the mobile
     breakpoint below used to have to force as a special case. The whole page scrolls naturally
     instead of two independently-scrolling fixed-height panes. */
  main {
    display: flex;
    flex-direction: column;
  }
  #library {
    padding: 16px 40px 20px;
  }
  #library h2, #timeline-col h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent-label);
    margin: 0 0 4px 0;
  }
  .library-heading-row {
    margin-bottom: 16px;
  }
  .library-h2-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .library-h2-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .library-h2-row h2 { margin: 0; }
  .library-subtitle {
    font-family: 'Spectral', Georgia, serif;
    font-size: 23px;
    color: var(--text);
    margin: 0;
  }
  .btn.pill { border-radius: 999px; padding: 9px 18px; }
  .timeline-heading-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .timeline-heading-left { min-width: 0; }
  #timeline-col .timeline-heading-row h2 { margin: 0 0 8px 0; }
  .timeline-heading-actions { display: flex; gap: 6px; align-items: center; }
  .timeline-heading-actions .btn { font-size: 12px; padding: 5px 10px; }
  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent-label);
    background: var(--accent-tint);
  }
  .rundown-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 22px 0;
    margin-top: 26px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .rundown-section-left { min-width: 0; }
  .rundown-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin: 5px 0 0;
  }
  .rundown-section-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #rundown-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .rundown-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .rundown-chip:hover { border-color: var(--accent); }
  .rundown-chip-load {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
  }
  .rundown-chip-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1;
    padding: 0 0 0 2px;
    opacity: 0.5;
  }
  .rundown-chip-del:hover { opacity: 1; color: var(--bad); }
  .rundown-empty { font-size: 12.5px; color: var(--text-dim); margin: 6px 0 0; }
  #rundown-select {
    font-size: 13px;
    padding: 8px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    max-width: 220px;
  }
  #search {
    width: 100%;
    padding: 12px 16px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    margin-bottom: 16px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  #search::placeholder { color: var(--text-dim); }
  #custom-radio-add {
    white-space: nowrap;
  }
  #custom-radio-status {
    font-size: 12px;
    min-height: 18px;
    margin-top: -8px;
    margin-bottom: 8px;
    color: var(--good);
    transition: opacity 0.3s;
  }
  #custom-radio-status.error { color: var(--bad); }
  #custom-radio-status.fade { opacity: 0; }
  #recently-used { margin-bottom: 14px; }
  .recently-used-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent-label);
    margin-bottom: 7px;
  }
  .recently-used-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .recent-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--chip-color, var(--border));
    border-radius: 14px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .recent-chip:hover { border-color: var(--accent); color: var(--accent-label); }
  .recent-chip-plus { font-size: 13px; opacity: 0.45; line-height: 1; }
  /* On mobile, HTML5 drag-and-drop does not fire on touch at all — swap instructional text. */
  .drag-hint { display: inline; }
  .tap-hint  { display: none; }
  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }
  .cat-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    -webkit-appearance: none;
    appearance: none; /* now a <button> -- strip native OS chrome, .cat-chip already fully styles it */
  }
  .cat-chip.active {
    border-color: var(--accent);
    color: var(--accent-label);
    background: var(--accent-tint);
  }
  /* A browsable grid uses the full-width library section effectively -- auto-fit lets the column
     count adapt to whatever width is available, from a phone-width single column up to several
     columns on a wide desktop window. */
  #source-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .source-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--card-color, var(--accent));
    border-radius: 10px;
    padding: 16px 16px 14px;
    cursor: grab;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .source-card:active { cursor: grabbing; }
  .source-card.dragging { opacity: 0.4; }
  .source-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .source-card-btns {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
  }
  .source-add-btn, .source-remove-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent-label);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .source-add-btn:hover { border-color: var(--accent); background: var(--accent-tint); }
  .source-remove-btn { color: var(--bad); font-size: 13px; }
  .source-remove-btn:hover { border-color: var(--bad); background: rgba(217,132,127,0.12); }
  .source-name {
    font-family: 'Spectral', Georgia, serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.25;
  }
  .source-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: auto;
    padding-top: 2px;
  }
  .tag {
    background: var(--tint-weak);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .tag-network {
    background: var(--accent-tint);
    color: var(--accent-label);
    font-weight: 600;
  }
  .source-desc {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    overflow-wrap: break-word;
    padding-right: 4px;
  }
  .sequential-progress {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--accent-label);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .sequential-reset-btn {
    font-family: inherit;
    font-size: 10px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    cursor: pointer;
  }
  .sequential-reset-btn:hover { border-color: var(--accent); color: var(--accent-label); }
  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 30px 10px;
  }
  #timeline-col {
    padding: 36px 40px 0;
  }
  #progress-label {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-height: 38px;
  }
  .progress-time {
    font-family: 'Spectral', Georgia, serif;
    font-size: 30px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .progress-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  #timeline-ruler {
    display: none;
    gap: 3px;
    height: 7px;
    margin-bottom: 24px;
  }
  #timeline-ruler > div {
    border-radius: 999px;
  }
  #timeline {
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
    gap: 14px;
    margin-bottom: 8px;
  }
  #timeline.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: 8px;
    border-radius: 10px;
    background: var(--accent-tint);
  }
  .timeline-drop-hint {
    min-width: 130px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-family: 'Spectral', Georgia, serif;
    font-style: italic;
    font-size: 15px;
    text-align: center;
    padding: 16px;
    line-height: 1.4;
    flex-shrink: 0;
    align-self: stretch;
    pointer-events: none;
    opacity: 0.65;
  }
  #timeline.empty .timeline-drop-hint {
    min-width: 260px;
    min-height: 110px;
    padding: 24px 20px;
  }
  /* Visual time-blocking: each block's width is proportional to its length (see renderTimeline's
     inline style), so the timeline reads like a real broadcast log/clock wheel at a glance. */
  .block {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--card-color, var(--accent));
    border-radius: 8px;
    padding: 14px 14px 12px;
    box-sizing: border-box;
    cursor: grab;
    position: relative;
    /* Column layout with the bottom row pushed to the end -- cards in the same row get stretched
       to equal height by #timeline's align-items:stretch (since name-text wrapping differs by
       card width), and without this the duration/remove row would sit at wherever the top content
       happened to end, landing at a different height on every card instead of lining up. */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .block.dragging { opacity: 0.4; }
  .block.playing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .block-progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--tint-weak);
    overflow: hidden;
    border-radius: 0 0 7px 7px;
  }
  .block-progress-fill {
    height: 100%;
    background: var(--card-color, var(--accent));
    width: var(--progress, 0%);
    transition: width 0.95s linear;
  }
  .block-top {
    display: block;
  }
  .block-index {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent-label);
    position: absolute;
    top: 10px;
    right: 12px;
    line-height: 1.4;
  }
  .block-body { min-width: 0; }
  .block-name { font-family: 'Spectral', Georgia, serif; font-size: 16px; font-weight: 500; }
  .block-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  /* A plain-language badge instead of the old stripe-pattern background -- a texture nobody could
     be expected to decode at a glance. Says exactly what it means: this one's length is yours to
     set (a live stream or an open-ended queue), not a fixed episode with a real runtime. */
  .flex-badge {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--accent-label);
    background: var(--tint-strong);
    padding: 1px 6px;
    border-radius: 4px;
    cursor: help;
  }
  .block-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-top: 10px;
  }
  .block-duration {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  /* The editable input (flexible blocks) and the plain-text pill (fixed blocks) share the exact
     same box model so the duration control is the same size and sits at the same height either
     way -- previously a bare span next to a bordered input made the two kinds of card look
     inconsistent side by side. */
  .block-duration input,
  .dur-fixed {
    height: 26px;
    box-sizing: border-box;
    padding: 0 6px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
  }
  .block-duration input {
    width: 44px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .dur-fixed {
    background: var(--tint-weak);
    border: 1px solid transparent;
    color: var(--text-dim);
    cursor: help;
  }
  .block-remove {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    width: 26px;
    height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  .block-remove:hover { color: var(--bad); background: var(--tint-weak); }
  .block-move {
    /* Hidden on desktop -- dragging a block is the primary way to reorder there, so a redundant
       pair of arrow buttons per block was pure clutter. Re-shown below at the mobile breakpoint,
       where native HTML5 drag-and-drop doesn't fire on touch at all (see that media query for
       why), so these are the only way to reorder blocks on a phone. */
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    width: 24px;
    height: 24px;
    padding: 0;
  }
  .block-move:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-label); }
  .block-move:disabled { opacity: 0.3; cursor: not-allowed; }
  .feed-badge {
    font-size: 9.5px;
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 0.03em;
  }
  .feed-badge.unverified { background: rgba(224,162,51,0.1); color: var(--text-dim); border: 1px solid rgba(224,162,51,0.3); }
  .feed-badge.none { background: rgba(224,90,90,0.1); color: var(--text-dim); border: 1px solid rgba(224,90,90,0.3); }
  .feed-badge.degraded { background: rgba(224,120,0,0.1); color: var(--text-dim); border: 1px solid rgba(224,120,0,0.35); }
  .header-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: 600; }
  .btn.primary:hover { opacity: 0.9; }
  #play-broadcast-btn { border-radius: 999px; padding: 11px 22px; box-shadow: var(--play-shadow); }
  .btn.danger { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 35%, transparent); }
  .btn.danger:hover { border-color: var(--bad); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .icon-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    border-radius: 999px;
  }
  #now-playing {
    display: none;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  #now-playing.active { display: block; }
  #np-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  #np-info { min-width: 0; }
  #np-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  #np-name { font-size: 15px; font-weight: 600; }
  #np-episode { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  #np-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #np-volume {
    width: 70px;
    accent-color: var(--accent);
    margin-right: 4px;
  }
  #np-controls button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 14px;
  }
  #np-controls button:hover { border-color: var(--accent); }
  #np-time-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #np-elapsed, #np-total {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  #np-scrub {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  #np-scrub.live { cursor: default; opacity: 0.5; }
  #np-scrub-fill { height: 100%; background: var(--accent); width: 0%; pointer-events: none; }
  #np-status { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  /* A raw always-visible log looks like debug output left in place -- tuck it behind a native
     <details> disclosure instead, closed by default, so it's there when you want it without
     cluttering the timeline view by default. */
  #playback-log-wrap {
    flex: 1;
    min-width: 0;
  }
  #playback-log-wrap > summary {
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    opacity: 0.7;
    list-style: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  #playback-log-wrap > summary::-webkit-details-marker { display: none; }
  #playback-log-wrap > summary::before {
    content: '▸';
    font-size: 9px;
    display: inline-block;
    transition: transform 0.15s ease;
    color: var(--text-dim);
    opacity: 0.6;
  }
  #playback-log-wrap[open] > summary::before { transform: rotate(90deg); }
  #playback-log-wrap > summary:hover { opacity: 1; }
  .playback-log-toolbar { display: flex; justify-content: flex-end; margin: 8px 0 0; }
  #playback-log {
    max-height: 170px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 14px;
    padding: 8px 10px;
    font-size: 11.5px;
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
  }
  .log-entry { padding: 2px 0; color: var(--text-dim); }
  .log-entry.log-error { color: var(--bad); }
  .log-entry.log-ok { color: var(--good); }
  .log-time { opacity: 0.6; margin-right: 6px; }
  #copy-log-btn { font-size: 12px; padding: 5px 10px; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 { margin: 0 0 10px 0; font-size: 16px; }
  .modal p { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .modal label { font-size: 12px; color: var(--text-dim); display: block; margin: 12px 0 4px; }
  .modal input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .modal code {
    background: var(--panel);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11.5px;
  }
  footer {
    padding: 20px 40px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-top: 40px;
  }
  #footer-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  #feedback-link, #suggest-source-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    white-space: nowrap;
  }
  #feedback-link:hover, #suggest-source-link:hover { border-color: var(--accent); color: var(--accent-label); }
  #footer-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    padding-top: 3px;
    opacity: 0.65;
    flex-shrink: 0;
  }
  /* Native drag-and-drop doesn't work at all on touchscreens, so the tap-based alternatives below
     (bigger touch targets, ↑/↓ reorder buttons) matter on phones in a way they don't on desktop. */
  @media (max-width: 768px) {
    header {
      padding: 16px 20px;
    }
    #timeline-col {
      padding-top: 24px;
      padding-left: 20px;
      padding-right: 20px;
    }
    #library {
      padding-top: 16px;
      padding-left: 20px;
      padding-right: 20px;
    }
    footer {
      padding: 16px 20px 32px;
      flex-direction: column;
      gap: 12px;
    }
    #footer-right { align-items: flex-start; }
    .brand-wordmark { font-size: 22px; }
    .header-buttons {
      width: 100%;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    /* Stack the timeline heading so the 3 action buttons don't crowd the title at narrow widths. */
    .timeline-heading-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .timeline-heading-actions {
      width: 100%;
      flex-wrap: wrap;
    }
    /* The saved-broadcasts right side (select + 2 buttons) is 328 px wide at desktop and would
       crush the left text panel to zero width on a 375 px phone — stack vertically instead. */
    .rundown-section {
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      padding: 16px 0;
    }
    /* Grid lets the select fill all remaining space while the two buttons stay natural-width. */
    .rundown-section-right {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }
    /* Library heading: the pill button sits beside the h2 label (not the subtitle), so no
       mobile override is needed — the h2 row stays horizontal at all widths. */
    /* Touch targets under ~40px are notoriously hard to tap precisely on a phone — grow the
       icon-only buttons instead of leaving them at their comfortable-with-a-mouse desktop size. */
    .block-move, .block-remove, .source-add-btn, .source-remove-btn {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
    .block-move { display: inline-flex; align-items: center; justify-content: center; }
    #np-controls button {
      width: 44px;
      height: 44px;
      font-size: 18px;
    }
    /* The proportional-width visual timeline is a desktop thing -- on a narrow phone screen there
       isn't room for meaningful width differences anyway, so fall back to the simpler, already
       touch-optimized full-width stacked list (same as before this feature existed). */
    .block {
      width: 100% !important;
    }
    .drag-hint { display: none; }
    .tap-hint  { display: inline; }
    .timeline-drop-hint {
      min-width: 100%;
      min-height: 80px;
    }
  }
  #offline-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9000;
    background: #b83232;
    color: #fff;
    text-align: center;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div id="offline-banner" aria-live="assertive"></div>

<header>
  <div class="header-brand">
    <div class="brand-bars" aria-hidden="true">
      <div style="height:13px"></div>
      <div style="height:30px"></div>
      <div style="height:20px"></div>
      <div style="height:34px"></div>
      <div style="height:10px"></div>
    </div>
    <h1 class="brand-wordmark">Airtime</h1>
    <span class="version-badge" id="version-display"></span>
  </div>
  <div class="header-buttons">
    <button class="btn icon-btn" id="theme-toggle-btn" title="Switch to light mode" aria-label="Switch to light mode">🌙</button>
    <button class="btn primary" id="play-broadcast-btn">▶ Play Broadcast</button>
  </div>
</header>

<main>
  <section id="timeline-col">
    <div id="now-playing">
      <div id="np-top">
        <div id="np-info">
          <div id="np-label">Now playing</div>
          <div id="np-name">—</div>
          <div id="np-episode"></div>
        </div>
        <div id="np-controls">
          <input type="range" id="np-volume" min="0" max="100" value="80" title="Volume" aria-label="Volume">
          <button id="np-prev" title="Previous" aria-label="Previous block">⏮</button>
          <button id="np-playpause" title="Play/Pause" aria-label="Play or pause">⏯</button>
          <button id="np-next" title="Next" aria-label="Next block">⏭</button>
          <button id="np-stop" title="Stop" aria-label="Stop broadcast">⏹</button>
        </div>
      </div>
      <div id="np-time-row">
        <span id="np-elapsed">0:00</span>
        <div id="np-scrub"><div id="np-scrub-fill"></div></div>
        <span id="np-total">0:00</span>
      </div>
      <div id="np-status" aria-live="polite"></div>
    </div>
    <div class="timeline-heading-row">
      <div class="timeline-heading-left">
        <h2>Your timeline</h2>
        <div id="progress-label"></div>
      </div>
      <div class="timeline-heading-actions">
        <button class="btn toggle-btn" id="repeat-toggle-btn" title="When on, the broadcast starts over from the beginning instead of stopping once it reaches the end" aria-pressed="false">🔁 Repeat: Off</button>
        <button class="btn" id="export-timeline-btn" title="Download this exact timeline as a file, e.g. to move it to another device or share it with someone">Export to file</button>
        <button class="btn" id="import-timeline-btn" title="Load a timeline from a file previously saved with Export to file">Import from file</button>
        <input type="file" id="import-timeline-input" accept="application/json" style="display:none">
        <button class="btn" id="clear-timeline-btn">Clear all</button>
      </div>
    </div>
    <div id="timeline-ruler"></div>
    <div id="timeline" class="empty"></div>
    <div class="rundown-section">
      <div class="rundown-section-left">
        <h2>Saved broadcasts</h2>
        <p class="rundown-subtitle">Save your timeline and reload it anytime.</p>
      </div>
      <div class="rundown-section-right">
        <button class="btn primary" id="rundown-save-btn">Save as…</button>
      </div>
    </div>
    <div id="rundown-chips"></div>
  </section>

  <section id="library">
    <div class="library-heading-row">
      <div class="library-h2-row">
        <h2>Source library</h2>
        <div class="library-h2-actions">
          <button class="btn primary pill" id="custom-radio-add">+ Custom channel</button>
          <button class="btn pill" id="custom-podcast-add" title="Add any podcast by pasting its RSS feed URL -- saved to your own browser, not the shared catalog">+ Add podcast</button>
        </div>
      </div>
      <p class="library-subtitle">Pick from the catalog</p>
    </div>
    <input type="text" id="search" placeholder="Search by name or network (e.g. BBC)..." aria-label="Search sources by name or network">
    <div class="cat-filters" id="cat-filters"></div>
    <div class="cat-filters" id="length-filters"></div>
    <div class="cat-filters" id="format-filters"></div>
    <div id="custom-radio-status"></div>
    <div id="source-list"></div>
  </section>

</main>

<footer>
  <details id="playback-log-wrap">
    <summary>Playback log</summary>
    <div id="playback-log"><div class="empty-state">Nothing played yet this session.</div></div>
    <div class="playback-log-toolbar">
      <button class="btn" id="copy-log-btn" title="Copy the full log to your clipboard">Copy log</button>
    </div>
  </details>
  <div id="footer-right">
    <a href="#" id="suggest-source-link" title="Suggest a show or station for the shared catalog -- opens a pre-filled GitHub issue">💡 Suggest a source</a>
    <a href="#" id="feedback-link" title="Opens a pre-filled bug report on GitHub (includes your version, browser, and recent playback log to help diagnose the issue) -- you'll need a free GitHub account to submit it">🐛 Report a bug / feedback</a>
    <span id="footer-status"></span>
  </div>
</footer>

<script>
// Bump on every deploy (alongside CACHE_NAME in sw.js) so the version badge in the header and
// the service worker's cache both reflect what's actually live.
const VERSION = '3.15.0';
document.getElementById('version-display').textContent = 'v' + VERSION;
(function() {
  const el = document.getElementById('footer-status');
  if (!el) return;
  // Count after SOURCES is defined (this runs inline, SOURCES is declared below)
  // — use a microtask to wait for the rest of the script to execute first.
  Promise.resolve().then(() => {
    const healthy = typeof SOURCES !== 'undefined'
      ? SOURCES.filter(s => s.feedStatus === 'verified').length : 0;
    el.textContent = `Airtime v${VERSION} · ${healthy} feeds healthy`;
  });
})();

// ---------- Theme ----------
// The actual theme attribute is already set pre-paint by the inline <script> in <head> (see
// there for why) -- this just wires up the toggle button to flip it and keep the icon in sync.
function applyThemeButton() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const btn = document.getElementById('theme-toggle-btn');
  btn.textContent = isLight ? '☀' : '☾';
  btn.title = btn.ariaLabel = isLight ? 'Switch to dark mode' : 'Switch to light mode';
}
applyThemeButton();
document.getElementById('theme-toggle-btn').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('airtime_theme_v1', next);
  applyThemeButton();
});

// ---------- Source catalog ----------
// sourceType: 'podcast-rss' | 'internet-radio' | 'archive'
// Music genre/decade/mood channels resolve live via the Radio-Browser API (a free, open directory
// of internet radio stations) rather than Spotify -- see feedUrl 'radio-browser:tag:<tag>' and
// fetchLatestEpisode(). No developer account, OAuth, or per-user auth needed at all.
// feedStatus: 'verified' (fetched & confirmed working) | 'unverified' (documented feed, blocked/network error during our check
//             but likely real — try it live) | 'none' (no working public feed exists, playback will skip this block)
const SOURCES = [
  { id: 'npr-hourly',      name: 'NPR Hourly News',                 category: 'NPR',        cadence: 'Hourly', lengthMin: 5,   flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.npr.org/500005/podcast.xml', feedStatus: 'verified', desc: 'Top-of-the-hour national news summary.' },
  { id: 'up-first',        name: 'NPR Up First',                    category: 'NPR',        cadence: 'Daily',  lengthMin: 15,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.npr.org/510318/podcast.xml', feedStatus: 'verified', desc: 'Morning news briefing, the day\'s top 3 stories.' },
  { id: 'indicator',       name: 'The Indicator from Planet Money', category: 'NPR',        cadence: 'Daily',  lengthMin: 10,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.npr.org/510325/podcast.xml', feedStatus: 'verified', desc: 'Short daily explainer on one economic idea.' },
  { id: 'waitwait',        name: 'Wait Wait... Don\'t Tell Me!',     category: 'NPR',        cadence: 'Weekly', lengthMin: 50,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.npr.org/344098539/podcast.xml', feedStatus: 'verified', desc: 'NPR\'s weekly news quiz show.' },
  { id: 'fresh-air',       name: 'NPR Fresh Air',                    category: 'NPR',        cadence: 'Daily',  lengthMin: 45,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.npr.org/381444908/podcast.xml', feedStatus: 'verified', desc: 'Terry Gross interviews.' },
  { id: 'ap-hourly',       name: 'AP Hourly Radio News',             category: 'News',       cadence: 'Hourly', lengthMin: 5,   flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://audioboom.com/channels/3270305.rss', feedStatus: 'verified', desc: 'Associated Press top-of-the-hour national and world news summary (via AudioBoom syndication).' },
  { id: 'abc-hourly',      name: 'ABC News Update',                  category: 'News',       cadence: 'Hourly', lengthMin: 5,   flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.megaphone.fm/ESP9792844572', feedStatus: 'verified', desc: 'ABC Audio\'s 5-minute national news update, refreshed twice hourly.' },
  { id: 'marketplace',     name: 'Marketplace (APM)',                category: 'Business',   cadence: 'Daily',  lengthMin: 26,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.publicradio.org/public_feeds/marketplace', feedStatus: 'verified', desc: 'Daily business and economic news.' },
  { id: 'nyt-daily',       name: 'The Daily (NYT)',                  category: 'News',       cadence: 'Daily',  lengthMin: 25,  flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://feeds.simplecast.com/Sl5CSM3S', feedStatus: 'verified', desc: 'One story, deeply reported, every weekday.' },
  { id: 'bbc-world-news',  name: 'BBC World Service News',           category: 'International', cadence: 'Hourly', lengthMin: 5, flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://podcast.voice.api.bbci.co.uk/rss/audio/p002vsmz?api_key=Wbek5zSqxz0Hk1blo5IBqbd9SCWIfNbT', feedStatus: 'verified', desc: 'Top-of-the-hour global news bulletin from the BBC World Service.' },
  { id: 'bbc-global-news', name: 'BBC Global News Podcast',          category: 'International', cadence: 'Daily', lengthMin: 30, flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://podcasts.files.bbci.co.uk/p02nq0gn.rss', feedStatus: 'verified', desc: 'BBC\'s twice-daily deep dive on the world\'s top stories.' },
  { id: 'dw-news',         name: 'DW News Brief',                    category: 'International', cadence: 'Hourly', lengthMin: 2, flexible: false, sourceType: 'podcast-rss', feedUrl: 'https://rss.dw.com/syndication/feeds/podcast_en_newsbrief.33191-mrss.xml', feedStatus: 'verified', desc: 'Deutsche Welle\'s short hourly news brief (~90 seconds).' },

function addCustomRadioChannel(query) {
  const trimmed = query.trim();
  if (!trimmed) return;
  const entry = {
    id: 'custom-' + Date.now(),
    name: trimmed + ' (Radio)',
    category: 'Music',
    cadence: 'Anytime',
    lengthMin: null,
    flexible: true,
    sourceType: 'internet-radio',
    feedUrl: 'radio-browser:tag:' + trimmed.toLowerCase(),
    feedStatus: 'verified',
    // Set explicitly rather than left for the id-prefix fallback in the SOURCES.forEach network
    // pass near NETWORK_MAP -- that pass only runs once at page load, so an entry added live this
    // session would otherwise show the literal string "undefined" as its network tag until reload.
    network: 'Radio-Browser',
    desc: 'Custom Radio-Browser search: "' + trimmed + '", length you set.',
  };
  SOURCES.push(entry);
  customRadioSources.push(entry);
  save('airtime_custom_sources_v1', customRadioSources);
  renderFilters();
  renderLibrary();
  addSourceToTimeline(entry.id);
  // Scroll the new block into view and show a confirmation near the button so it's
  // obvious something happened (the block appears in the timeline above the library).
  const statusEl = document.getElementById('custom-radio-status');
  if (statusEl) {
    statusEl.className = '';
    statusEl.textContent = '✓ "' + trimmed + '" added to your timeline ↑';
    clearTimeout(statusEl._timer);
    statusEl._timer = setTimeout(() => {
      statusEl.classList.add('fade');
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 350);
    }, 3500);
  }
  const blocks = document.querySelectorAll('#timeline .block');
  const last = blocks[blocks.length - 1];
  if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

// Removes a user-created custom channel from the catalog for good. Any timeline blocks already
// referencing it are left alone -- they keep their cached name/lengthMin (see addSourceToTimeline)
// and simply fail to resolve at play time with the existing "source no longer exists" skip message,
// same as if any other catalog source were removed. No special-casing needed there.
function removeCustomRadioChannel(id) {
  const idx = SOURCES.findIndex(s => s.id === id);
  if (idx !== -1) SOURCES.splice(idx, 1);
  customRadioSources = customRadioSources.filter(s => s.id !== id);
  save('airtime_custom_sources_v1', customRadioSources);
  renderFilters();
  renderLibrary();
}

// Fetches and sanity-checks an arbitrary podcast RSS/Atom URL before adding it -- reuses the same
// proxy chain every catalog podcast source goes through (fetchTextWithProxies, defined further down
// but hoisted like every other function declaration in this file), so a feed that needs a proxy to
// bypass CORS here works exactly the same way it would for a built-in source. Throws with a message
// meant to be shown directly to the user, rather than returning a generic ok/fail flag, since the
// failure reasons here (not XML, no episodes, no audio) are meaningfully different problems.
async function validatePodcastFeed(url) {
  const xmlText = await fetchTextWithProxies(url);
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('That URL didn\'t return a valid RSS feed');
  const items = [...doc.querySelectorAll('item, entry')];
  if (items.length === 0) throw new Error('That feed has no episodes');
  const hasAudio = items.some(item => {
    if (item.querySelector('enclosure')?.getAttribute('url')) return true;
    return !!item.getElementsByTagNameNS('*', 'content')[0]?.getAttribute('url');
  });
  if (!hasAudio) throw new Error('That feed has episodes but no audio files -- may be video-only or text-only');
  const title = doc.querySelector('channel > title')?.textContent?.trim()
    || doc.querySelector('feed > title')?.textContent?.trim()
    || 'Custom Podcast';
  // Best-effort typical-episode-length estimate from the latest item's <itunes:duration>, if present
  // (either plain seconds or HH:MM:SS/MM:SS) -- purely for the running-total display, since this
  // source plays non-flexible (see addCustomPodcast) and always runs to its own real natural end
  // regardless of this estimate, same as every other podcast-rss source in the catalog.
  let lengthMin = 30;
  const durText = items[0].getElementsByTagNameNS('*', 'duration')[0]?.textContent?.trim();
  if (durText) {
    const secs = /^\d+$/.test(durText)
      ? parseInt(durText, 10)
      : durText.split(':').map(Number).reduce((acc, n) => (isNaN(n) ? acc : acc * 60 + n), 0);
    if (secs > 0) lengthMin = Math.max(1, Math.round(secs / 60));
  }
  return { title, lengthMin };
}

// Adds a user's own podcast by RSS URL -- a personal addition saved to this browser only (like
// addCustomRadioChannel above), not a contribution to the shared catalog everyone else sees.
async function addCustomPodcast(url) {
  const trimmed = url.trim();
  if (!trimmed) return;
  const statusEl = document.getElementById('custom-radio-status');
  if (statusEl) { statusEl.className = ''; statusEl.textContent = 'Checking feed…'; }
  try {
    const { title, lengthMin } = await validatePodcastFeed(trimmed);
    const entry = {
      id: 'custom-' + Date.now(),
      name: title,
      category: 'My Podcasts',
      cadence: 'Varies',
      lengthMin,
      flexible: false,
      sourceType: 'podcast-rss',
      feedUrl: trimmed,
      feedStatus: 'verified',
      network: 'Independent',
      desc: 'Your own podcast, added by RSS feed URL.',
    };
    SOURCES.push(entry);
    customRadioSources.push(entry);
    save('airtime_custom_sources_v1', customRadioSources);
    renderFilters();
    renderLibrary();
    addSourceToTimeline(entry.id);
    if (statusEl) {
      statusEl.className = '';
      statusEl.textContent = '✓ "' + title + '" added to your timeline ↑';
      clearTimeout(statusEl._timer);
      statusEl._timer = setTimeout(() => {
        statusEl.classList.add('fade');
        setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 350);
      }, 3500);
    }
    const blocks = document.querySelectorAll('#timeline .block');
    const last = blocks[blocks.length - 1];
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  } catch (e) {
    if (statusEl) { statusEl.className = 'error'; statusEl.textContent = '✗ Could not add this feed: ' + e.message; }
  }
}

// ---------- State ----------
let activeCategory = null;
let activeLengthBucket = null;
let activeFormat = null;
let searchText = '';
let timelineBlocks = load('airtime_timeline_v1', []);
let rundowns = load('airtime_rundowns_v1', []);
// Defaults off. When on, reaching the end of the timeline restarts from block 0 instead of
// stopping (see the "index >= timelineBlocks.length" branch in playBlockAt) -- applies whether the
// end is reached by natural auto-advance or a manual "next" past the last block, since both funnel
// through that same check.
let repeatBroadcast = load('airtime_repeat_v1', false);

// One-time seed of a few starter broadcasts, so a first-time visitor has something to hit Play on
// immediately instead of facing an empty timeline and a 100+ source catalog with nothing pre-built.
// Gated by its own flag rather than "rundowns.length === 0" so that deleting a starter later (they're
// just regular saved broadcasts once added -- rename/delete both work normally) doesn't cause it to
// silently come back on the next load.
const STARTER_RUNDOWNS = [
  {
    id: 'starter-morning-commute',
    name: 'Morning Commute',
    blocks: [
      { sourceId: 'up-first', lengthMin: 15 },
      { sourceId: 'nyt-daily', lengthMin: 25 },
      { sourceId: 'indicator', lengthMin: 10 },
      { sourceId: 'short-wave', lengthMin: 12 },
    ],
  },
  {
    id: 'starter-evening-wind-down',
    name: 'Evening Wind-Down',
    blocks: [
      { sourceId: 'meditation-minis', lengthMin: 10 },
      { sourceId: 'soma-dronezone', lengthMin: 30 },
    ],
  },
  {
    id: 'starter-weekend-deep-dive',
    name: 'Weekend Deep Dive',
    blocks: [
      { sourceId: 'tal', lengthMin: 59 },
      { sourceId: 'throughline', lengthMin: 45 },
    ],
  },
];
if (!load('airtime_starters_seeded_v1', false)) {
  rundowns = [...STARTER_RUNDOWNS, ...rundowns];
  save('airtime_rundowns_v1', rundowns);
  save('airtime_starters_seeded_v1', true);
}

// ---------- Source health ----------
// Local overrides on top of feedStatus: 'unverified' sources get promoted to 'verified' when they
// successfully play; sources that fail 3+ times in a row get flagged 'degraded'. Both states are
// transient (degraded expires after 24h) and affect only library badges — not core playback logic.
let sourceHealthOverrides = load('airtime_source_health_v1', {});
function getLocalStatus(src) {
  const h = sourceHealthOverrides[src.id];
  if (!h) return null;
  if (h.localStatus === 'degraded' && h.lastFailAt && (Date.now() - h.lastFailAt > 86400000)) {
    delete sourceHealthOverrides[src.id];
    save('airtime_source_health_v1', sourceHealthOverrides);
    return null;
  }
  return h.localStatus || null;
}
function recordSourceSuccess(srcId) {
  const prev = sourceHealthOverrides[srcId] || {};
  sourceHealthOverrides[srcId] = { ...prev, failCount: 0, lastSuccessAt: Date.now(), localStatus: 'verified' };
  save('airtime_source_health_v1', sourceHealthOverrides);
}
function recordSourceFailure(srcId) {
  const prev = sourceHealthOverrides[srcId] || { failCount: 0 };
  const failCount = (prev.failCount || 0) + 1;
  const localStatus = failCount >= 3 ? 'degraded' : (prev.localStatus || null);
  sourceHealthOverrides[srcId] = { ...prev, failCount, lastFailAt: Date.now(), localStatus };
  save('airtime_source_health_v1', sourceHealthOverrides);
}

// ---------- Sequential episode tracking ----------
// Serialized narrative shows (Serial, Revolutions, Hardcore History -- anything with
// `sequential: true` in SOURCES) must be heard in order, unlike every other podcast-rss source
// which always plays whatever's latest. Progress is keyed by RSS guid (falling back to the
// episode's audio URL when a feed omits guid) rather than array index, so it stays correct even if
// the feed's episode count or ordering shifts between visits. Stored per-device only -- there's no
// account system, so listening on a second device starts that device from episode 1 independently.
let sequentialProgress = load('airtime_sequential_progress_v1', {});
function getSequentialProgress(srcId) {
  return sequentialProgress[srcId] || null;
}
// episodeIndex/totalEpisodes are cached from the feed snapshot at play time purely so the library
// card can show "Next: Episode N of M" without re-fetching the whole feed on every render -- if the
// show adds episodes between visits, totalEpisodes just reflects the count as of the last play.
function saveSequentialProgress(srcId, episodeGuid, episodeIndex, totalEpisodes) {
  sequentialProgress[srcId] = { episodeGuid, episodeIndex, totalEpisodes, playedAt: Date.now() };
  save('airtime_sequential_progress_v1', sequentialProgress);
}
function resetSequentialProgress(srcId) {
  delete sequentialProgress[srcId];
  save('airtime_sequential_progress_v1', sequentialProgress);
}

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

// ---------- Library rendering ----------
const LENGTH_BUCKETS = [
  { id: 'under5', label: 'Under 5 min', test: len => len < 5 },
  { id: '5to20',  label: '5-20 min',    test: len => len >= 5 && len <= 20 },
  { id: 'over20', label: '20+ min',     test: len => len > 20 },
];

// A "Podcast" bucket wouldn't be useful as a genre category (it'd match ~80 of 113 sources), but
// it's a genuinely useful independent filter dimension alongside category/length — distinguishing
// delivery format (episodic RSS feed vs. always-on radio stream) rather than subject.
const FORMAT_GROUPS = [
  { id: 'podcast', label: 'Podcast', test: s => s.sourceType === 'podcast-rss' || s.sourceType === 'archive' },
  { id: 'radio',   label: 'Internet Radio', test: s => s.sourceType === 'internet-radio' },
];

// Returns true when the source's delivery format matches the active format chip, or no filter is active.
function matchesFormat(s) {
  if (!activeFormat) return true;
  const group = FORMAT_GROUPS.find(g => g.id === activeFormat);
  return group ? group.test(s) : true;
}

// Returns true when the source's length fits the active length bucket, or no filter is active.
// Flexible sources always pass regardless of bucket — their duration is set by the user at drop
// time, not fixed by the source, so they legitimately fit any length the user will choose.
function matchesLengthBucket(s) {
  if (!activeLengthBucket) return true;
  if (s.flexible) return true; // length is user-set at drop time, so it fits every bucket
  const bucket = LENGTH_BUCKETS.find(b => b.id === activeLengthBucket);
  return bucket ? bucket.test(s.lengthMin) : true;
}

// Rebuilds the category, length, and format chip rows, keeping the currently active chip highlighted.
// NPR sorts first in the category list — it has the most entries and is the most-used filter.
// Filter chips are real <button> elements (not <div>s with onclick) so keyboard users can actually
// reach and activate them -- found during an accessibility pass that they were plain divs, meaning
// the entire category/length/format filtering system (the primary way to navigate 150+ sources) was
// completely unreachable without a mouse or touchscreen. aria-pressed reflects the active state for
// screen readers, matching how a real toggle button should announce itself.
function renderFilters() {
  const cats = [...new Set(SOURCES.map(s => s.category))].sort((a, b) => {
    if (a === 'NPR') return -1;
    if (b === 'NPR') return 1;
    return a.localeCompare(b);
  });
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.type = 'button';
  allChip.className = 'cat-chip' + (activeCategory === null ? ' active' : '');
  allChip.textContent = 'All';
  allChip.setAttribute('aria-pressed', String(activeCategory === null));
  allChip.onclick = () => { activeCategory = null; renderFilters(); renderLibrary(); };
  wrap.appendChild(allChip);
  cats.forEach(cat => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'cat-chip' + (activeCategory === cat ? ' active' : '');
    chip.textContent = cat;
    chip.setAttribute('aria-pressed', String(activeCategory === cat));
    chip.onclick = () => { activeCategory = (activeCategory === cat ? null : cat); renderFilters(); renderLibrary(); };
    wrap.appendChild(chip);
  });

  const lengthWrap = document.getElementById('length-filters');
  lengthWrap.innerHTML = '';
  const allLengthChip = document.createElement('button');
  allLengthChip.type = 'button';
  allLengthChip.className = 'cat-chip' + (activeLengthBucket === null ? ' active' : '');
  allLengthChip.textContent = 'Any length';
  allLengthChip.setAttribute('aria-pressed', String(activeLengthBucket === null));
  allLengthChip.onclick = () => { activeLengthBucket = null; renderFilters(); renderLibrary(); };
  lengthWrap.appendChild(allLengthChip);
  LENGTH_BUCKETS.forEach(b => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'cat-chip' + (activeLengthBucket === b.id ? ' active' : '');
    chip.textContent = b.label;
    chip.setAttribute('aria-pressed', String(activeLengthBucket === b.id));
    chip.onclick = () => { activeLengthBucket = (activeLengthBucket === b.id ? null : b.id); renderFilters(); renderLibrary(); };
    lengthWrap.appendChild(chip);
  });

  const formatWrap = document.getElementById('format-filters');
  formatWrap.innerHTML = '';
  const allFormatChip = document.createElement('button');
  allFormatChip.type = 'button';
  allFormatChip.className = 'cat-chip' + (activeFormat === null ? ' active' : '');
  allFormatChip.textContent = 'Any format';
  allFormatChip.setAttribute('aria-pressed', String(activeFormat === null));
  allFormatChip.onclick = () => { activeFormat = null; renderFilters(); renderLibrary(); };
  formatWrap.appendChild(allFormatChip);
  FORMAT_GROUPS.forEach(g => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'cat-chip' + (activeFormat === g.id ? ' active' : '');
    chip.textContent = g.label;
    chip.setAttribute('aria-pressed', String(activeFormat === g.id));
    chip.onclick = () => { activeFormat = (activeFormat === g.id ? null : g.id); renderFilters(); renderLibrary(); };
    formatWrap.appendChild(chip);
  });
}

// Renders the "Next: Episode N of M" line (or "Starts from Episode 1" if never played) shown on
// sequential-source cards, plus a reset control once progress exists. totalEpisodes is a snapshot
// from the last time this show was played (see saveSequentialProgress), not a live feed count.
function sequentialBadgeHtml(s) {
  const p = getSequentialProgress(s.id);
  if (!p || !p.totalEpisodes) {
    return `<div class="sequential-progress">▶ Starts from Episode 1</div>`;
  }
  const finished = p.episodeIndex >= p.totalEpisodes - 1;
  const nextNum = finished ? 1 : p.episodeIndex + 2;
  const label = finished
    ? `↺ Finished all ${p.totalEpisodes} — replays from Episode 1`
    : `▶ Next: Episode ${nextNum} of ${p.totalEpisodes}`;
  return `
    <div class="sequential-progress">
      <span>${label}</span>
      <button class="sequential-reset-btn" data-id="${s.id}" title="Start this show over from Episode 1">↺ reset</button>
    </div>
  `;
}

function renderLibrary() {
  const list = document.getElementById('source-list');
  list.innerHTML = '';

  // Recently used chips — shown at top when the user has added sources before. Only chips that
  // pass the current filters are shown so the row stays relevant (e.g. no Music chips while
  // browsing News). Hidden entirely when filters would leave it empty.
  const recentSrcs = recentSourceIds
    .map(id => SOURCES.find(s => s.id === id))
    .filter(Boolean)
    .filter(s => !activeCategory || s.category === activeCategory)
    .filter(matchesLengthBucket)
    .filter(matchesFormat);
  if (recentSrcs.length > 0) {
    const recentEl = document.createElement('div');
    recentEl.id = 'recently-used';
    recentEl.innerHTML = '<div class="recently-used-label">Recently used</div><div class="recently-used-row"></div>';
    const row = recentEl.querySelector('.recently-used-row');
    recentSrcs.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'recent-chip';
      chip.style.setProperty('--chip-color', CATEGORY_COLORS[s.category] || 'var(--border)');
      chip.title = s.desc;
      chip.innerHTML = `${s.name} <span class="recent-chip-plus">+</span>`;
      chip.addEventListener('click', () => addSourceToTimeline(s.id));
      row.appendChild(chip);
    });
    list.appendChild(recentEl);
  }

  const q = searchText.trim().toLowerCase();
  const matches = SOURCES
    .filter(s => !activeCategory || s.category === activeCategory)
    .filter(matchesLengthBucket)
    .filter(matchesFormat)
    .filter(s => !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.network.toLowerCase().includes(q));

  if (matches.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No sources match your filters. Try clearing the category, length, or search filters.';
    list.appendChild(empty);
    return;
  }

  matches.forEach(s => {
      const card = document.createElement('div');
      card.className = 'source-card';
      card.draggable = true;
      card.style.setProperty('--card-color', CATEGORY_COLORS[s.category] || 'var(--accent)');
      const localStatus = getLocalStatus(s);
      const effectiveStatus = localStatus || s.feedStatus;
      const badgeText = effectiveStatus === 'verified' ? '' : effectiveStatus === 'degraded' ? '⚠ recent errors' : effectiveStatus === 'unverified' ? 'may not load' : 'unavailable';
      const badgeClass = effectiveStatus === 'degraded' ? 'degraded' : s.feedStatus;
      card.innerHTML = `
        <div class="source-card-top">
          <div class="source-name">${s.name}</div>
          <div class="source-card-btns">
            ${s.id.startsWith('custom-') ? `<button class="source-remove-btn" title="Delete this custom channel" aria-label="Delete ${s.name}" data-id="${s.id}">✕</button>` : ''}
            <button class="source-add-btn" title="Add to timeline" aria-label="Add ${s.name} to timeline" data-id="${s.id}">+</button>
          </div>
        </div>
        <div class="source-desc">${s.desc}</div>
        <div class="source-meta">
          <span class="tag tag-network">${s.network}</span>
          <span class="tag">${s.category}</span>
          <span class="tag">${s.cadence}</span>
          <span class="tag">${s.flexible ? 'flex' : s.lengthMin + ' min'}</span>
          ${badgeText ? `<span class="feed-badge ${badgeClass}">${badgeText}</span>` : ''}
        </div>
        ${s.sequential ? sequentialBadgeHtml(s) : ''}
      `;
      card.addEventListener('dragstart', e => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', s.id);
        e.dataTransfer.effectAllowed = 'copy';
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.querySelector('.source-add-btn').addEventListener('click', e => {
        e.stopPropagation();
        addSourceToTimeline(s.id);
      });
      card.addEventListener('dblclick', () => addSourceToTimeline(s.id));
      const removeBtn = card.querySelector('.source-remove-btn');
      if (removeBtn) {
        removeBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm('Delete the custom channel "' + s.name + '"? This can\'t be undone.')) return;
          removeCustomRadioChannel(s.id);
        });
      }
      const resetBtn = card.querySelector('.sequential-reset-btn');
      if (resetBtn) {
        resetBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm('Start "' + s.name + '" over from Episode 1?')) return;
          resetSequentialProgress(s.id);
          renderLibrary();
        });
      }
      list.appendChild(card);
  });
}

// ---------- Timeline rendering ----------
// Visual time-blocking: width scales with duration so the timeline reads like a real broadcast
// log at a glance. Clamped so a 2-min StarDate stays tappable and a 2-hour PHC show doesn't
// swallow the whole row.
function blockWidthPx(lengthMin) {
  // 136px is the narrowest a card can go while still comfortably fitting the editable-duration
  // row (input + unit label + remove button) on one line without wrapping -- verified live that
  // 120px was too tight and silently wrapped that row onto a second line, throwing off vertical
  // alignment against neighboring cards.
  return Math.max(136, Math.min(320, 40 + lengthMin * 2.5));
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = '';
  el.classList.toggle('empty', timelineBlocks.length === 0);

  timelineBlocks.forEach((b, idx) => {
    const src = SOURCES.find(s => s.id === b.sourceId);
    const isFlexible = src ? !!src.flexible : false;
    const block = document.createElement('div');
    block.className = 'block' + (isFlexible ? ' flexible' : '') + (typeof playerState !== 'undefined' && playerState.currentIndex === idx ? ' playing' : '');
    block.draggable = true;
    block.dataset.uid = b.uid;
    // Keyboard equivalent for "click a block to jump straight to playing it" -- role/tabindex/
    // keydown mirror the existing click handler below (including its guard against double-handling
    // clicks on the block's own nested button/input children).
    block.tabIndex = 0;
    block.setAttribute('role', 'button');
    block.setAttribute('aria-label', 'Play ' + b.name);
    block.style.setProperty('--card-color', CATEGORY_COLORS[b.category] || 'var(--accent)');
    block.style.width = blockWidthPx(b.lengthMin) + 'px';
    block.innerHTML = `
      <div class="block-top">
        <div class="block-index">${idx + 1}</div>
        <div class="block-body">
          <div class="block-name">${b.name}</div>
          <div class="block-meta">
            ${b.category} · ${src ? src.cadence : '<span class="feed-badge none">source removed</span>'}
            ${src?.feedStatus === 'none' ? '<span class="feed-badge none">unavailable</span>' : ''}
            ${isFlexible ? `<span class="flex-badge" title="You set how long this one plays -- it's a live stream or open-ended queue, not a fixed episode.">Flexible</span>` : ''}
          </div>
        </div>
      </div>
      <div class="block-bottom">
        <div class="block-duration">
          ${isFlexible
            ? `<input type="number" min="1" value="${b.lengthMin}" data-uid="${b.uid}" class="dur-input" aria-label="Length in minutes for ${b.name}"> min`
            : `<span class="dur-fixed" title="This plays to its own natural end automatically -- it can't be lengthened or shortened. Shown here only as an estimate for the running total.">~${b.lengthMin} min</span>`
          }
        </div>
        <button class="block-move" data-uid="${b.uid}" data-dir="-1" title="Move up" aria-label="Move ${b.name} up" ${idx === 0 ? 'disabled' : ''}>↑</button>
        <button class="block-move" data-uid="${b.uid}" data-dir="1" title="Move down" aria-label="Move ${b.name} down" ${idx === timelineBlocks.length - 1 ? 'disabled' : ''}>↓</button>
        <button class="block-remove" data-uid="${b.uid}" aria-label="Remove ${b.name} from timeline">✕</button>
      </div>
      <div class="block-progress-bar"><div class="block-progress-fill"></div></div>
    `;
    block.addEventListener('dragstart', e => {
      block.classList.add('dragging');
      e.dataTransfer.setData('text/x-reorder', b.uid);
      e.dataTransfer.effectAllowed = 'move';
    });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));
    block.addEventListener('click', e => {
      if (e.target.closest('button, input')) return;
      playerState.playing = true;
      playBlockAt(idx);
    });
    block.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      if (e.target.closest('button, input')) return;
      e.preventDefault(); // stop Space from also scrolling the page
      playerState.playing = true;
      playBlockAt(idx);
    });
    el.appendChild(block);
  });

  // Drag-and-drop doesn't fire at all on touchscreens (see the "+" button / tap-to-add path used
  // everywhere else in this file), so telling a phone user to "drag a source here" is actively
  // wrong advice on mobile -- found during a real mobile-viewport QA pass. .drag-hint/.tap-hint
  // already had a working CSS toggle (shown/hidden by the same 768px breakpoint the rest of the
  // touch-vs-desktop UI uses) but no HTML was actually using it anymore.
  const hint = document.createElement('div');
  hint.className = 'timeline-drop-hint';
  hint.innerHTML = '<span class="drag-hint">Drag a source<br>here to add it</span><span class="tap-hint">Tap + on a source<br>below to add it</span>';
  el.appendChild(hint);

  el.querySelectorAll('.block-move').forEach(btn => {
    btn.addEventListener('click', () => moveBlock(btn.dataset.uid, parseInt(btn.dataset.dir)));
  });
  el.querySelectorAll('.dur-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = timelineBlocks.findIndex(x => x.uid === inp.dataset.uid);
      if (idx === -1) return;
      const b = timelineBlocks[idx];
      b.lengthMin = Math.max(1, parseInt(inp.value) || 1);
      persistTimeline();
      renderProgress();
      // If this is the block currently playing, apply the new length live instead of only on
      // the next play-through (which may never come, since each block only plays once per pass).
      if (typeof playerState !== 'undefined' && playerState.currentIndex === idx && playerState.blockStartedAt) {
        playerState.blockBudgetSec = b.lengthMin * 60;
      }
    });
  });
  el.querySelectorAll('.block-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const removedIndex = timelineBlocks.findIndex(x => x.uid === btn.dataset.uid);
      if (removedIndex !== -1) {
        if (playerState.currentIndex === removedIndex) {
          // Removing the block that's actually playing right now -- don't leave it audible for a
          // block that no longer exists in the timeline.
          stopBroadcast();
        } else if (playerState.currentIndex > removedIndex) {
          // A block before the one currently playing was removed -- every later index shifts down
          // by one, so keep currentIndex pointing at the same block that's still actually playing.
          playerState.currentIndex--;
        }
      }
      timelineBlocks = timelineBlocks.filter(x => x.uid !== btn.dataset.uid);
      persistTimeline();
      renderTimeline();
      renderProgress();
    });
  });

  renderProgress();
}

// Updates the running total time and block count shown below the timeline.
function renderProgress() {
  const total = timelineBlocks.reduce((sum, b) => sum + b.lengthMin, 0);
  const h = Math.floor(total / 60), m = total % 60;
  const timeStr = total === 0 ? '0m' : (h > 0 ? `${h}h ${m}m` : `${m}m`);
  const n = timelineBlocks.length;
  const metaStr = n === 0 ? '' : `total &middot; ${n} block${n !== 1 ? 's' : ''}`;
  document.getElementById('progress-label').innerHTML =
    `<span class="progress-time">${timeStr}</span>${metaStr ? `<span class="progress-meta">${metaStr}</span>` : ''}`;
  renderTimelineRuler();
}

// Draws the proportional color-coded bar under the timeline — one segment per block, sized by share of total time.
function renderTimelineRuler() {
  const ruler = document.getElementById('timeline-ruler');
  if (!ruler) return;
  const total = timelineBlocks.reduce((s, b) => s + b.lengthMin, 0);
  if (!total) { ruler.style.display = 'none'; return; }
  ruler.style.display = 'flex';
  ruler.innerHTML = timelineBlocks.map(b => {
    const pct = (b.lengthMin / total * 100).toFixed(2);
    const color = CATEGORY_COLORS[b.category] || 'var(--accent)';
    return `<div style="width:${pct}%;background:${color};opacity:0.75;flex-shrink:0;"></div>`;
  }).join('');
}

function persistTimeline() { save('airtime_timeline_v1', timelineBlocks); }

// "Rundowns" (broadcast-industry term for a planned segment lineup) are named, saved timeline
// presets -- they store sourceId + lengthMin per block, NOT specific episodes, so loading one
// later and hitting Play always grabs whatever's currently latest for date-sensitive/rolling
// sources (e.g. "My 8am Commute" always plays *today's* NPR Hourly News, not the one from when it
// was saved).
function renderRundownChips() {
  const el = document.getElementById('rundown-chips');
  if (rundowns.length === 0) {
    el.innerHTML = '<p class="rundown-empty">No saved broadcasts yet.</p>';
    return;
  }
  // The "load" trigger is a real <button>, not a click handler on the wrapping <div> -- found
  // during an accessibility pass that the whole chip (including every starter template) was
  // unreachable by keyboard, only the delete "x" (already a real button) was. No stopPropagation/
  // closest() guard needed anymore since load and delete are now sibling buttons, not parent/child.
  el.innerHTML = rundowns.map(r => `
    <div class="rundown-chip">
      <button class="rundown-chip-load" data-id="${escapeHtml(r.id)}">${escapeHtml(r.name)}</button>
      <button class="rundown-chip-del" data-id="${escapeHtml(r.id)}" title="Delete this broadcast" aria-label="Delete ${escapeHtml(r.name)}">×</button>
    </div>
  `).join('');
  el.querySelectorAll('.rundown-chip-load').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const r = rundowns.find(x => x.id === id);
      if (!r) return;
      if (timelineBlocks.length > 0 && !confirm('Replace your current timeline with "' + r.name + '"?')) return;
      if (typeof stopBroadcast === 'function') stopBroadcast();
      timelineBlocks = r.blocks.map(b => {
        const src = SOURCES.find(s => s.id === b.sourceId);
        return {
          uid: 'b' + Date.now() + Math.random().toString(36).slice(2, 7),
          sourceId: b.sourceId,
          name: src ? src.name : b.sourceId,
          category: src ? src.category : '',
          lengthMin: b.lengthMin,
        };
      });
      persistTimeline();
      renderTimeline();
    });
  });
  el.querySelectorAll('.rundown-chip-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const r = rundowns.find(x => x.id === id);
      if (!r || !confirm('Delete "' + r.name + '"?')) return;
      rundowns = rundowns.filter(x => x.id !== id);
      save('airtime_rundowns_v1', rundowns);
      renderRundownChips();
    });
  });
}

// ---------- Drop handling ----------
const timelineEl = document.getElementById('timeline');

timelineEl.addEventListener('dragover', e => {
  e.preventDefault();
  timelineEl.classList.add('drag-over');
});
timelineEl.addEventListener('dragleave', () => timelineEl.classList.remove('drag-over'));

timelineEl.addEventListener('drop', e => {
  e.preventDefault();
  timelineEl.classList.remove('drag-over');

  const reorderUid = e.dataTransfer.getData('text/x-reorder');
  if (reorderUid) {
    // reordering within the timeline: figure out drop target index by mouse position
    const afterEl = getDragAfterElement(timelineEl, e.clientX, e.clientY);
    const draggedIdx = timelineBlocks.findIndex(b => b.uid === reorderUid);
    if (draggedIdx === -1) return;
    const [dragged] = timelineBlocks.splice(draggedIdx, 1);
    if (afterEl == null) {
      timelineBlocks.push(dragged);
    } else {
      const afterUid = afterEl.dataset.uid;
      const afterIdx = timelineBlocks.findIndex(b => b.uid === afterUid);
      timelineBlocks.splice(afterIdx, 0, dragged);
    }
    persistTimeline();
    renderTimeline();
    return;
  }

  addSourceToTimeline(e.dataTransfer.getData('text/plain'));
});

// Shared by both the drag-and-drop handler and the tap-to-add "+" button on each source card —
// native HTML5 drag-and-drop doesn't fire on touchscreens at all, so the "+" button is the only
// way to build a timeline on a phone.
function addSourceToTimeline(sourceId) {
  const src = SOURCES.find(s => s.id === sourceId);
  if (!src) return;
  timelineBlocks.push({
    uid: 'b' + Date.now() + Math.random().toString(36).slice(2, 7),
    sourceId: src.id,
    name: src.name,
    category: src.category,
    lengthMin: src.flexible ? 30 : src.lengthMin,
  });
  trackRecentSource(src.id);
  persistTimeline();
  renderTimeline();
  renderLibrary();
}

// Swaps the block identified by uid one position in the given direction (+1 down, -1 up) and re-renders.
function moveBlock(uid, direction) {
  const idx = timelineBlocks.findIndex(b => b.uid === uid);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= timelineBlocks.length) return;
  [timelineBlocks[idx], timelineBlocks[newIdx]] = [timelineBlocks[newIdx], timelineBlocks[idx]];
  persistTimeline();
  renderTimeline();
}

// The timeline now wraps left-to-right like real text, not a strict vertical stack, so "where do I
// drop this" needs both axes: find the closest block whose center is later in reading order (same
// row and further right, or an earlier position in a later row) and insert before it.
function getDragAfterElement(container, x, y) {
  const els = [...container.querySelectorAll('.block:not(.dragging)')];
  let closest = { distance: Infinity, element: null };
  for (const child of els) {
    const box = child.getBoundingClientRect();
    const centerX = box.left + box.width / 2;
    const centerY = box.top + box.height / 2;
    const sameRow = Math.abs(centerY - y) <= box.height / 2;
    const isAfterInFlow = centerY > y + 4 || (sameRow && centerX > x);
    if (!isAfterInFlow) continue;
    const dx = centerX - x, dy = centerY - y;
    const distance = dx * dx + dy * dy;
    if (distance < closest.distance) closest = { distance, element: child };
  }
  return closest.element;
}
